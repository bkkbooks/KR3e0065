body:
  text: 脉訣刋誤醫家類提要臣等謹案脉訣刋誤二卷元戴啟宗撰啟宗字同父金陵人官龍興路儒學教授考隋書經籍志載王叔和脉經十卷唐志並同而無所謂脉訣者呂復羣經古方論曰脉訣一卷乃六朝髙陽生所撰托以叔和之名謬立七表八裏九道之目以惑學者通真子劉元賔為之注且續歌括附其後詞既鄙俚意亦滋晦其説良是然以髙陽生為六朝人則不應隋志唐志皆不著録是亦考之未審文獻通考以為熈寧以前人偽托得其實矣其書自宋以來屡為諸家所攷駁然泛言大略未及一一核正其失且淺俚易誦故俗醫仍相𫝊習啟宗是書乃考證舊文句句為辨原書偽妄始抉摘無遺於脉學殊為有禆明嘉靖間祁門汪機刋之又以諸家脉書要語類為一卷及所撰矯世惑脉論一卷並附録於後以其説足相發明仍並載之資㕘考焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:282566f676ea640b5d9a90d79fb329c1412c55b7eabd3e188264c43259fba2e5
