body:
  text: 脉訣刋誤集解卷上元戴啟宗撰六朝髙陽生剽竊晉太醫令王叔和撮其切要撰為脉訣蔡西山辨之詳矣世醫因人相授咸曰王叔和脉訣既不能正其名又不能辨其非訛承惑因是以罔覺今刋其誤曰脉訣不以王叔和加其首者先正其名也竊取靈素内經秦越人張仲景華陀王叔和及歴代名醫之書以証又述諸家所解集長辨短知我者其惟脉訣乎罪我者其惟脉訣乎診候入式歌左心小腸肝膽腎右肺大腸脾胃命腎十二經動脉循環無端始於手太隂終於足厥隂一晝夜五十周朝於寸口㑹於平旦内經診以平旦難經獨取寸口寸口者即手太隂之經渠穴也上古診法有三其一各於十二經動脉見處分為三部天地人以候各臓腑其二以寸口與人迎參之以騐引繩四時之大小以決其病其三獨取寸口以内外分臓腑以髙下定身形斯王叔和之所取以為寸口臓腑之位脉訣述之有差脉經兩尺並屬腎與膀胱今脉訣以命門列右尺通真子注又以三焦為命門合並屬右尺是不可以不辯十八難曰手心主少陽火生足太隂陽明土土主中宮故在中部也亦未嘗言手心主少陽火在何部也二十五難曰心主與三焦為表裏靈樞銅人並同又未嘗以三焦合命門也且持脉有道因動脉而有别假使以右腎為命門之臓外無經絡其動脉何在且命門之説始於扁鵲亦不分男女左右考之内經腎未嘗分為兩臟未嘗有命門也惟銅人有命門穴在十四椎下靈樞言兩目為命門既無動脉何以為診又非正臟何以列部腎有兩枚均為腎尺内以候腎同列左右尺斯黄岐之正論習醫者不夲内經而信末世昧理之謬論安能悟其非而造其妙三因方以右腎左右尺中屬手厥隂經與三焦手少陽經合則又差之甚矣心主非右腎也手厥隂雖與三焦經合其經起於心中出屬心包絡終於手小指次指其經不行尺部之下也何以列在右尺黎氏曰扁鵲以心主與三焦為表裏而脉訣以命門與三焦為表裏者以腎為精之舎三焦為精之府也命門雖係一臟外别無經與腎俱屬足少隂經與足太陽膀胱相為表裏以此推之三焦之氣與命門通而三焦之經不與命門合也扁鵲之論為正然則寸口之部位以何為正也脉要精微論曰尺内兩傍則季脇也尺内以候腎尺外以候腹中附上左外以候肝内以候膈右外以候胃内以候脾上附上右外以候肺内以候胷中左外以候心内以候膻中前以候前後以候後上竟上者胷喉中事也下竟下者少腹腰股膝脛足中事也此寸口部之定位也或曰必以動脉為診則手厥隂少陽二經當列何部也曰經云手少隂獨無腧乎其外經病而臟不病也故治痛者治包絡之經無犯其經則手厥隂同手少隂經部診也手少陽為三焦則各分於上中下部以診也則十二經動脉皆可診於寸口矣潔古以地道自古逆行言脉三部自手少隂君火心始逆而至厥隂風木肝逆而至太陽寒水外應十一月内應於左尺腎與膀胱接右手肺應九月居右寸逆至太隂土為脾應右闗又逆至手厥隂與三焦以愚考之此乃地六氣之步位故歳首於春初之氣亦始厥隂風木君火不任令退居二氣而少陽相火當夏為三之氣四氣太隂五氣陽明六氣太陽乃取地之六氣依四時而至難以言寸口三部之位且六節氣位乃地理之應也經曰顯明之右君火之位君火之右退行一步相火治之復行一步土氣治之雖始以君火亦順次而行未嘗逆楊仁齋以右尺其經手厥隂其臟心包絡其府三焦其名命脉決非右腎之命門以愚考之十二經脉自上古立名今不悟脉歌非王叔和之本經又立命脉以附和之且本於内經尺内以候腎原不曽分左右是合左右之尺皆以候腎亦無所謂命脉矣仁齋直指於醫方發明甚髙惜乎於此未明女人反此背看之男女脉形有異同尺脉位第三同斷腎病歌首二句只言部位未論脉女人反此背㸔云者原其惑於男左腎右命門女左命門右腎故言反此又繼之曰尺脉第三同斷病則反此背㸔者只論尺脉耳男女有異同者脉形爾如男脉闗上盛女脉闗下盛男左大右小為順女右大左小為順男女脉位即無異同也以十二經脉所行之終始五臟之定位成形則一也惟莖戸及胞門子户精血之不同耳安可言脉位女人與男子反而背者乎脉訣之誤因於腎與命門有男女之别不知腎有兩其左為腎右為命門難經雖有左右之别亦無男女左右之分其實皆腎臟非命門也至褚氏遺書則又以女人心肺自尺始倒裝五臟則謬又甚焉或曰南政北政三隂司天在泉而尺寸亦或易位褚氏之論或原此乎曰不然也司天在泉以天之六歩為客脉也故随南北政以分尺寸之不應耳其地之六部為主脉即隨候以見而不移也心肺在上肝腎在下脾脉在中自三才分而為人亘古今何嘗異無求子曰所謂反者男子尺脉常弱今反盛女子尺脉常盛今反弱故謂之反耳李晞范因之雖於反字義明不同於衆論然反盛反弱乃男女之病脉今入式歌方言部位而遽以病脉牽解似非本㫖特作歌者不善行文故以反此背㸔傳惑於世耳今刋而改之如上心與小腸居左寸肝膽同居左闗定腎居尺脉亦如然用意調和審安静肺與大腸居右寸脾胃脉從闗裏認命門還與腎脉同用心仔細須尋趂此脉訣重分左右寸闗尺部所出也其曰命門還與腎脉同以此句觀之命門即腎也既知其非動脉前何必以命門為臟而列部耶察病指南以右手尺為命門却又曰一名手心主包絡則又差以命門為心主也心為藏小腸為府以府配藏者實以手少隂心經與手太陽小腸經二經脉相接故同一部其餘藏府同部皆同然藏府之脉實以浮沉之位别之府陽也故因浮而見藏隂也故因沉而見然以難經一脉十變推之如云心急甚者肝邪干心心微急者膽邪干小腸是又以本藏之脉微甚别藏府也察病指南以七難六氣循甲子旺脉分六府者非也陽明脉浮大而短安得為胃脉形也浮大而短陽明燥金脉也若診他脉覆手㸔要自㸔時仰手認診脉皆須仰手㸔覆手反診因不應古人診病必仰病人手而診醫者覆其手以三部九候菽重之法取之惟反其診者不然蓋南北二政之歳三隂司天在泉尺寸或有不應者反其診則應矣不應者脉沉不應診也覆病人手診之則脉見也沉者為浮細者為大捨此之外無覆手之診升按脉訣之言謂診他則覆手自診則仰手取手便而已刋誤蓋誤認歌意以醫之覆手診人為覆病人之手也自此以後有似此者節去之而不辯三部須教指下明難經曰脉有尺寸何謂也然尺寸者脉之大要㑹也從關至尺是尺内隂之所治也從關至魚際是寸口内陽之所治也故分寸為尺分尺為寸故隂得尺中一寸陽得寸内九分尺寸終始一寸九分故曰尺寸也蔡氏曰手太隂之脉自腕中横紋至魚際横紋得同身之一尺一寸自腕中横紋前盡一尺為隂之位自魚際後一寸為陽之位太隂動脉前不及魚際横紋一分後不及腕中横紋九寸故古人於寸内取九分尺内取一寸㝠契陽九隂十自然之數尺寸之間謂之闗關者隂陽之限也索氏曰諸家論脉部位或曰尺寸或曰寸關尺或曰三寸為三部或尺寸三部通論其不同者何也素問言脉之部位止言尺寸未言闗也至扁鵲難經乃言有闗部在尺寸之交蓋扁鵲假設闗位而寓於尺寸之交以為三部也其實只有尺寸而已逮仲景本論及王叔和言脉之部位或以尺寸通論某藏某府受病者是確言諸藏府之脉只一之意也乃合黄帝之説矣或以三部分論某藏某府受病者是假言諸藏府之脉各出之意也乃合扁鵲之説矣今究仲景叔和既宗黄帝言只有尺寸又從扁鵲三部之説何哉蓋黄帝言尺寸者約度之義扁鵲言三部者亦約度之義仲景叔和所以兼取並用非疑而兩存之也千金載黄帝問曰何謂三部脉也岐伯曰寸闗尺也今考黄帝書無此説思邈假托耳通真子曰素問三部九候論所述三部言身之上中下部非謂寸關尺也九候了然心裏印素問曰人有三部部有九候乃各於動脉現處候之分九候今脉訣所歌以寸闗尺三部每三部内有浮中沉三候浮以候府中以候胃氣沉以候藏通一手三部為九候也大腸共供肺為傳送素問曰大腸者傳導之官變化出焉肺者相傳之官治節出焉傳送者大腸之職非與肺共也大腸以肺為藏供送應副而已心與小腸為受盛小腸受盛與心應素問曰小腸者受盛之官化物出焉小腸配心藏與之相應非心與小腸同受盛也脾胃相通五榖消素問曰脾與胃以膜相連耳胃受五榖脾氣磨而消之膀胱腎合為津慶通精徑腎之所攝者精胞之所藏者溺精溺之洩同為一徑竇而出若曰津慶膀胱雖為津液之府然五藏六府皆有津液非腎膀胱所専主也三焦無狀為府空有名寄分在胸中腹膈相應此段皆以藏府配合為歌至三焦却不以命門為配其以三焦附於尺診歟且心主與三焦為表裏心主脉歴絡三焦手少陽脉徧屬三焦其治各有所上焦如霧中焦如漚下焦如瀆各有法象不偏在下安可診於尺也且難經曰上部法天主胸以上至頭之有疾即上焦之部中下部即中下焦分診甚明矣三因方之好異也云三焦有形如脂膜附於兩腎夾脊若果如此則内經難經言之矣其經脉又何徧屬歴絡之云乎肝膽同為津液府居能上通眼目為清浄素問曰膀胱者州都之官津液藏焉則津液府施於膀胱為當以為肝膽則非又肝藏膽府今云同為府辭又害意今改之同為津液居乃言肝膽之津液耳五藏各有液肝之液泣其候目五府皆有出入惟膽無出入其膽之精氣則因肝之餘氣溢入於膽故藏在肝短葉間相並而居内藏精汁三合其汁清浄經曰膽者清浄之府肝藏血開竅於目肝受血而能視故上通眼人年老目昏者血衰肝葉薄膽汁减也智者能調五藏和自然察認諸家病素問曰常以不病調病人醫不病故為病人平息以調之為法陳氏曰凡欲診脉先調自氣息壓取病人息以候其遲數過與不及所謂以我醫彼莫之敢違掌後髙骨號為闗骨下闗脉形宛然以次推排名分尺澤寸三部還須仔細㸔尺澤者手太隂之合穴在肘中約紋上其取一寸九分之法上始魚際大淵下終尺澤一尺一寸於尺取一寸於寸取九分為三部之位通真子云三部寸口在上闗脉在中尺澤在下尺澤者尺脉一寸之外餘脉所不出不見如入深澤而穴故曰尺澤安可以穴名而言尺部今改之無求子於三部每部以浮中沉及四旁分為七候先浮按消息之次中按消息之次重按消息之次上竟消息之次下竟消息之次推指外消息之次推指内消息之此無求子合經中諸法以為定法也凡診平人之脉常以平旦凡診病脉則不以晝夜王貺子亨法也闗前為陽明寸口闗後為隂直下取陽弦頭痛定無疑隂弦腹痛何方走陽數即吐為熱兼頭痛吐血隂微即㵼臍中吼難經曰數則為熱脉經曰陽數則吐血陽實應知面熱風隂微盗汗勞兼有陽實大滑應舌強隂數脾臍熱下並熱口痛臭乆脉經云尺脉數惡寒臍下熱痛尺主下部今云脾熱口臭脾在中州非尺所係陽微浮弱定心寒隂滑食注脾家咎經脉不調候脉經曰尺脉滑血氣實婦人經脉不利及尿血食注脾咎當診於闗上闗前闗後辯隂陽察病根源應不朽此總結闗前為陽名寸口以下之文也脉經辯隂陽大法云闗前為陽闗後為隂陽數吐血隂微下利陽弦頭痛隂弦腹痛陽微自汗隂微自下陽數口生瘡隂數加微必惡寒而煩燥不得眠陽微不能呼隂微不能吸今脉訣所述或遵或違何也潔古曰陽弦為脉浮而弦隂弦為脉沉而弦但言隂陽者乃脉之浮沉也經曰浮為表沉為裏非止寸口獨浮尺獨沉尺寸俱有浮沉今按潔古論浮沉表裏則是而以論此段隂陽則非蓋脉經脉訣皆以闗前陽闗後隂啓之中論脉証後又以闗前闗後辯隂陽結之安可以浮沉論一息四至號平和更加一至大無疴素問曰人一呼脉再動一吸脉再動呼吸定息脉五動閏以大息命曰平人難經曰脉来一呼再至不大不小曰平二經之言不同何也蓋難經因論損至之之脉而概舉也故於至脉則云一呼再至曰平不言一吸者舉一使反三隅也及後再舉則兼呼吸總論不大不小者息數調匀也然不若内經理備言詳其曰閏以大息者閏在氣盈朔虚之間大息在呼吸之間猶歳之閏非一呼一吸之外再有呼吸也大息者呼吸定息在呼吸之間脉因而又一動以成五動之數亦如呼出心與肺吸入腎與肝而脾受榖氣於中在呼出吸入之間也三遲二敗冷危困六數七極熱生多八脱九死十歸墓十一十二絶魂瘥三至為遲一二敗一息一至着牀害兩息一至死非􅏜遲敗前已言矣今重出况下文兩息一至正論損損有四等故改之以舉其凡例十四難曰何謂損一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絶損脉從下上自一呼一至而至四呼一至也然離經奪精則必死矣何待三呼四呼一至故脉訣兩息一至即言死仲景曰脉有四損三日死平人四息病人脉一至也五損一日死平人五息病人脉一至也六損一時死平人六息病人脉一至也此仲景於四損之上又増五損六損為一日一時死期遲冷數熱古今同難經越度分明載難經曰數則為熱遲則為寒越度者秦越人之法度也熱即積生風冷生動氣用心指下丁寜記熱豈能生風熱積之多則風生冷不能生氣冷積之多則動氣然冷熱亦能動血而為病不可專泥也春弦夏洪鈎秋似毛冬石依經分節氣素問曰春脉如弦其氣来耎弱輕虛以滑端直以長故曰弦夏脉如鈎其氣来盛去衰故曰鈎秋脉如浮其氣来輕虛以浮来急去散冬脉如營其氣来沉以摶故曰營難經曰春弦脉来厭厭聶聶如循榆葉當依素問作脉来耎弱招招如揭長竿末稍曰平益實而滑如循長竿曰病急而勁益強如新弓弦曰死夏鈎脉来纍纍如環如循琅玕曰平来益數如鷄舉足曰病前曲後倨如操帶鈎曰死秋毛脉来藹藹如車蓋按之益大當依素問厭厭聶聶如落榆葉曰平不上不下如循鷄羽曰病按之消索如風吹毛曰死冬石脉上大下銳如雀之啄曰平啄啄連屬其中微曲曰病来如解索去如彈石曰死今按四時之脉皆取法象本乎難經夏脉不當改作洪阿阿緩若春楊柳此是脾家居四季四時之末土旺十八日此脾土之本位然而四時之候四藏之脉皆以脾土胃氣為夲難經曰脾者中州其和平不可得見衰乃見耳来如雀之啄如水之漏下是脾家之衰見也脉經曰六月季夏建未坤之間土之位脾旺之時其脉火阿阿而緩名曰平脉今脉訣増春楊栁以為法象蔡氏曰凡脉不大不細不長不短不浮不沉不滑不澁應手中和意思欣欣難以名狀為胃氣亦可謂善於形容者矣今按脉經所言四時之平脉者有胃氣之脉也病脉者四時脉多而胃氣少者也死脉者但有四時脉而無胃氣者也如此則胃氣之脉隨四時而寓於當時之脉之中為平脉也不可得而見亦不可得而形容其曰阿阿而緩者専以四季十八日中所診而見者言之耳在意專心察細微靈樞曉解通𤣥記浮芤滑實弦緊洪七表陽脉還應是本宗微沉緩濇遲并伏濡弱相兼八裏隂脉同脉不可以表裏定名也惟浮沉二脉可以表裏論黄岐越人仲景叔和皆不言表裏脉經王氏所作無七表八裏九道之名今脉訣竊託叔和之名其論脉却悖於脉經自六朝以来以七表八裏九道為世大惑未有言其非者王裳著闡微論謂脉訣論表不及裏於脉之形狀大有發明至於表裏則不言其非尚拘拘増數長二脉為九表加短細二脉為十裏以九與十為隂陽數之極嗚呼脉之變化固從隂陽生然安可以名數拘之哉從来之論脉有以浮沉長短滑澁為三隂三陽者有以大小滑澁浮沉可以指别者有以大浮數動滑為陽沉澁弱弦微為隂者有以按尺寸觀浮沉滑濇而知病所生以治者是皆以隂陽對舉而互見也未嘗云七表八裏九道也但七表八裏九道果可以盡脉之數乎内經曰鼓曰摶曰喘曰横曰急曰燥仲景曰偞卑榮章剛損曰縱横逆順豈七表八裏九道之能盡也然其名雖異實不出乎隂陽故脉當以隂陽察形不當以表裏定名内經曰脉合隂陽又曰善診者察色按脉先别隂陽諸脉因浮而見者皆云表不拘於七表諸脉因沉而見者皆曰裏不拘於八裏沉而滑亦曰裏浮而濇亦曰表詳辯在衆脉條下血榮氣衛定息數一萬三千五百通素問曰榮者水榖之精氣也和調於五藏洒陳於六府乃能入於脉也故循脉上下貫五藏絡六府也衛者水榖之悍氣其氣慓疾滑利不能入於脉也故循皮膚之中分肉之間謂脉外熏於肓膜散於胸腹靈樞曰人受氣於榖榖入於胃以𫝊與肺五藏六府皆以受氣其清者為榮濁者為衛榮行脉中衛行脉外營周不休五十而大㑹又曰榖氣津液已行榮衛大通乃化糟粕以次𫝊下又曰榖始入於胃其精微者先出於胃之兩焦以溉五藏别出兩行榮衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入又曰其浮氣之循於經者為衛氣其精氣之行於經者為榮氣又曰五榖入於胃也其糟粕津液宗氣分為三隊故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉營氣者泌其津液注之於脉化以為血以榮四末内注五藏六府以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也榮氣衛氣皆津液之所行又曰榮衛者精氣也血者神氣也故血之與氣異名而同類焉又曰榮出中焦衛出上焦又曰上焦開發宣五榖味熏膚充身澤毛若霧露之溉是謂氣中焦受氣取汁變化而赤是謂血又曰經脉者所以行血氣而營隂陽濡筋骨利闗節者也衛氣者所以温分肉充皮膚肥湊理司開闔者也靈樞曰人經脉周身十六丈二尺漏水下百刻分晝夜人一呼脉再動氣行三寸一吸脉亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺二百七十息氣行十六丈二尺一周於身下水二刻二千七百息氣行十周於身下水二十刻一萬三千五百息則氣五十周水下百刻故五十營者備得天地之壽矣凡行八百一十丈也又曰衛氣之行一日一夜五十周於身晝行於陽二十五周夜行於隂二十五周周於五藏是故平旦隂盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者别於目鋭眥下手太陽下至手小指之間外側其散者别於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至手小指之間别者以上至耳前合於頷脉注足陽明以下行至足附上入五指之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出内踝下行隂分復合於目故為一周是故日行一舎人氣行身一周與十分身之八其始入於隂常從足少隂注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為周是故夜行一舎人氣行於隂藏一周與十分藏之八亦如陽行之二十五周而復㑹於目詳見靈樞衛氣行七十六此五十周衛氣之行也晝行陽二十五度夜行隂二十五度五十周而後大㑹於平旦者榮衛息數同也其始從中焦注手太隂陽明陽明注足陽明太隂太隂注手少隂少陽少陽注足太陽少隂少隂注手心主少陽少陽注足少陽厥隂厥隂復還注手太隂此經脉行度終始也與衛氣之行則各異三因方云血為脉氣為息一呼一吸一定息脉行六寸二百七十息行盡十六丈二尺者血之脉也氣之息遲於脉八息三分三釐三毫方行一寸一萬三千五百息方行盡十六丈一尺今按經云氣積於胃以通榮衛各行其道宗氣流於海下者注氣街上者走息道如此則榮衛各道如上文靈樞所言榮者水榖之精氣出於中焦變化為赤入於脉與息數呼吸應衛者水榖之悍氣出於上焦行於脉外温分肉充皮膚司開闔不與脉同行不與榮同道不與息數同應榮衛也其異如此然而行於身也晝夜五十周則榮與衛一也三因以血為脉指榮言以氣為息指衛言而謂榮血之脉晝夜五十周衛氣之息晝夜一周不知何據而與古經如此其異也又按難經曰榮氣之行常與衛氣相隨上下衛由息而動巢元方謂氣行則血行氣住則血住皆疑其𫝊誤王冰謂刺絡通榮衛不當兼言衛在絡之間也靈樞衛氣行篇云衛氣之行晝行陽則目張而寤夜行隂則目瞑而寐謹按此節言平旦陽氣之出目而下行於手足三陽也皆一時分道並注非有先後次第也此經篇末言水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在隂分者則是先下太陽究竟然後下少陽俟少陽究竟然後下陽明俟陽明究竟方上行隂分大與此節矛盾並衍文也又按此節言陽氣流行之周數及下文言漏水所下之刻數合而推之其為衍文明矣何以言之夫晝日漏水之下凡五十刻晝日陽氣之行凡二十五周以晝日漏水之刻數配於晝日陽氣之周數則陽氣一周配水下二刻也又以漏水之二刻配於陽氣之一周則陽氣之從平旦出目而分道並注下於手足三陽也蓋配水下一刻焉其從足心之出内踝上行隂分而復合於目亦配水下一刻是為一周也如此則水下一刻人氣當在三陽水下二刻人氣當在隂分而行一周於身也水下三刻人氣又當在三陽水下四刻人氣又當在隂分而行一周於身也如此周流三陽與隂分至水下五十刻則得二十五周於身而與篇首晝日行陽之數相合今此篇末水下一刻人氣在太陽二刻在少陽三刻在陽明四刻在隂分之説則是水下四刻配人氣行一周於身水下八刻配人氣行二周於身水下五十刻配人氣行一十二周半於身與篇首晝日行於陽二十五度之説不合豈經之本㫖耶榮氣之行自手太隂始至足厥隂終為一周於身也詳其一周於身外至身體四肢内至五藏六府無不周徧故其五十周無隂陽晝夜之殊衛氣之行則不然晝但周陽於身體四肢之外不入五藏六府之内夜但周隂於五藏六府之内不出身體四肢之外故必五十周至平旦方與榮大㑹於肺手太隂也心藏歌一心藏身之精君小腸為弟兄受盛心者君主之官一身之主宰也經曰主明則下安曰身之精不見心為尊矣精有兩義有生之来謂之精經曰兩神相摶合而成形常先身生是謂精非心之專主也有五藏六府之精經曰腎受而藏之腎為精之處非心之所主也心藏小腸府大言隂與陽小言夫與婦不可以兄弟言小腸為受盛之官象離隨夏旺屬火向南生明任物無纎巨多謀最有靈内行於血海外應舌將榮衝脉為十二經之海靈樞曰血海者衝脉也又手太陽少隂二經為表裏心主血上為乳汁下為月水經曰二陽之病發心脾女子不月心歌云内行血海以此李晞范以肝為血海而牽合之非也七孔多聰慧三毛上智英反時憂不解順候脉洪驚平洪脉見於夏為順候平脉何驚之有液汗通皮潤聲言爽氣清伏梁秋得積如臂在臍縈心之積名伏梁出難經若内經腹中論所載伏梁乃風根也非心積也順視雞冠色凶㸔瘀血凝診時須審委細察要叮嚀實夢憂驚佈虚翻烟火明靈樞曰正邪從外襲内而未有定舎與榮衛俱行而與魂魄飛揚使人卧不得安而喜夢秤之十二兩小大與常平心藏歌二三部俱數心家熱舌上生瘡唇破裂狂言滿目見鬼神飲水百杯終不歇心藏歌三心脉芤陽氣作聲時失血榮或時血痢尿血吐交横溢闗骨痛心煩燥更兼頭面赤騂騂池氏曰溢闗者隂氣上至於闗而未溢於闗前陽部腎之隂水欲勝心火火不受邪水火交爭而兩傷腎傷則骨痛心傷則煩燥以致氣上攻而頭面赤大實由来面赤風燥痛面色與心同微寒虚惕心寒熱急則腸中痛不通實大相兼並有滑舌強心驚語話難單滑心熱别無病澁無心力不多言沉緊心中逆冷痛弦時心急又心懸肝藏歌一肝藏應春陽連枝膽共房色青形象木位列在東方含血榮於目牽筋運爪將逆時生恚怒順候脉弦長泣下為之液聲呼是本鄉味酸宜所納麻榖應隨糧實夢山林樹虚㸔細草芒積因肥氣得杯覆脇隅傍翠羽身將吉顔同枯草殃四斤餘四兩七葉兩分行肝藏歌二三部俱弦肝有餘目中疼痛苦弦虛怒氣滿胸常欲叫翳矇童子淚如珠肝藏歌三肝軟並弦本没邪緊因筋急有些些細㸔浮大更兼實赤痛昏昏似物遮溢闗過寸口相應目眩頭重與筋痛芤時眼暗或吐血四肢癱瘓不能行澁則縁虚血散之肋脹脇滿自應知滑因肝熱連頭目緊實弦沉痃癖基微弱浮散氣作難目暗生花不耐㸔盛浮筋弱身無力遇此還須四體癱脾藏歌一脾藏象中坤安和對胃門王時隨四季自與土為根磨榖能消食榮身性本温應唇通口氣連肉潤肌敦形扁廣才長三五寸五膏凝散半斤難經曰脾廣三寸長五寸脉訣止言扁三寸失長五寸之文今合廣長著三五之數順時脉緩慢失則氣連吞素問曰五氣所病脾為吞又曰刺中脾十日死其動如吞李晞范曰連吞者所以形容緊數之脉狀乖於内經失脉訣意實夢歌歡樂虚爭飲食分濕多成五泄腸走響若雷奔痞氣冬為積皮黄四體昏二斤十四兩三斗五升存脾藏歌二三部俱緩脾家熱口臭胃翻長嘔逆齒腫齗宣注氣纒寒熱時時少心力脾藏歌三脾脉實并浮消中脾胃虛口乾饒飲水多食亦肌虚肌亦作飢單滑脾家熱口氣氣多粗濇則非多食食不作肌膚微浮傷客熱来去乍微疎有緊脾家痛仍兼筋急拘欲吐即不吐冲冲未得蘓若弦肝氣盛妨食被機謀大實心中痛如邪勿帶符溢闗涎出口風中見羈孤肺藏歌一肺藏最居先大腸通道宣兑為八卦地説金屬次五行牽傳皮與毛通應魂將魄共連鼻聞香臭辨壅塞氣相煎語過多成𠻳瘡浮酒灌穿猪膏凝者吉枯骨命難存本積息賁患乗春右脇邉順時浮濇短反即大洪弦實夢兵戈競虚行渉夢水野田靈樞曰厥氣客於大腸則夢田野今按脉訣以水田為肺虚之夢非也大腸虚為厥氣所客則夢田野府虛致藏虛或可連稱若曰水田則腎夢也三斤三兩重六葉散分懸肺藏歌二三部俱浮肺藏風鼻中多水唾稠濃壯熱惡寒皮肉痛顙乾雙目淚酸疼肺藏歌三肺脉浮兼實咽門燥又傷大便難且澁鼻内乏馨香實大相兼滑毛焦涕唾粘更和咽有燥秋盛夏宜砭沉緊相兼滑仍聞咳𠻳聲微浮兼有散肺脉本家形溢出胸中滿氣泄大腸鳴弦冷腸中結芤暴痛無成為失血榮暴痛無成是不痛也潔古解得之解作痛者又非改為失血為當沉細仍兼滑應知是骨蒸皮毛皆總澁寒熱兩相承腎藏歌一腎藏對分之膀胱共合宜旺冬身行屬水位北定無疑兩耳通為竅三焦附在斯二隂竅附斯三焦非腎所附説見前篇腎開竅於二隂與兩耳皆為腎竅味鹹歸藿豆精志自相隨沉滑當時本脉浮攤緩厄在脾色同烏羽吉形似炭煤危冷積多成唾焦燥水易虧奔豚臍下積究竟骨將痿實夢腰難脊解虛行溺水湄曰難解是不解也一斤餘一兩脇下腰脊對相垂依難經曰腎形如江豆相並而曲附於脊膂外與臍相對脇下肝之部位非腎位亦不垂腎藏歌二三部俱遲腎藏寒皮膚燥澁髪毛乾忽夢鬼神時入水覺来情思歸無歡腎藏歌三腎散腰間氣尿多更滑精軟為膝脛痛隂汗豈無憑實滑小便澁淋痛濇騂騂脉濇精頻漏恍惚夢魂多小腸疝氣逐夢裏涉江河實大膀胱熱小便難不通滑弦腰脚痛沉緊病還同單平匀無病憊浮緊耳應聾左右手分診五藏五時脉歌左右須候四時脉四十五動為一息日三氣畢難經曰脉不滿五十動一止一藏無氣脉訣生死歌云五十不止身無病數内有止皆知病正本難經今此乃曰四十五動為一息及六部脉歌皆以四十五動為凖乖於内經謬於名數今於後六歌皆當改作五十動為是且一息者一呼一吸也四十五動非止一息也若以息為止息則脉經所謂五十動不止者五藏六府皆受氣即無病五十動一止五歳死五動一止五日死四十五動除去五動而不及五十不知何意今詳此句想因四時脉而言或本於内經冬至夏至各四十五日為隂陽上下之期一時六氣九十日三氣得四十五日今改為四十五日以合内經李晞范脉髓作四十五動圖說亦巧而未敢信通真子潔古諸解穿鑿皆非蓋脉之流行如環無端無一息之停未嘗以五十動一止為限但止即為病依數而止期以歳死不依數而止則為結促代三病脉矣指下弦浮急洪緊數時便是有風兼熱極忽然匿匿慢沉細冷疾纒身無他事兼患氣賊脉頻来問五行屋漏雀啄終不治左手寸口心脉歌左手頭指火木之子四十五動五十動脉無他事左手者病人之手頭指者醫者按脉初下第一部之指下凖此心火為木之子三十一動忽然沉頓飯忽来還復此春中候得夏須憂夏若得之秋絶體秋脉如斯又凖前冬若候之春必死脉沉頓飯之乆然後来乃絶止之脉見於三十一動之間三十動一止應在三年死今云在三月一時之後是以月為年也此下六歌之非皆然當以在後生死候歌為正左手闗部肝脉歌左手中指木相連脉候還須來一息足五十二十六動沉却来肝藏有風兼熱極尅在二年為死日曰沉却来即是止脉不可為風熱之診此歌蓋𫝊誤大抵止脉皆不吉之兆諸家穿鑿以求符合皆非今直據診生死候歌斷之二十動一止二歳死下倣此不再論三十九動濇匿匿本藏及筋終絶塞一十九動便沉沉肝絶未曽人救得左手尺部腎脉歌左手腎脉指第三四十五動五十動足無疾咎闕指下急急動弦數時便是熱風之脉候忽然来徃慢慢極腎藏敗時須且救此病多從冷變来療之開破千金口二十五動沉却来腎絶醫人無好手努力黄泉在眼前縱在也應終不乆右手寸口肺脉歌右手頭指肺相連四十五動五十動足無憂慮極急明知是中風更㸔二十餘七度忽然指下来徃慢肺冷莫言無大故一朝肺絶脉沉沉染病卧牀思此語十二動而又不来咳𠻳唾濃兼難補髮直如麻只片時毛折皮枯喘不休扁鵲也應難救䕶髪直如麻小腸絶也改作毛折皮枯以合難經手太隂脉絶之証仲景云若汗髪潤喘不休者肺先絶右手闗上脾脉歌右手第二指連脾四十五動五十動足無諸疑急動名為脾熱極食不能消定若斯欲知病患多為冷指下尋之慢極遲吐逆不定經旬日胃氣衝心得幾時右手尺部命門腎脉歌右手命腎脉三指下五十動足不須怕一十九動黙然沉有死無生命絶也指下急急動如弦腎藏有風猶且治七動沉沉更不来努力今朝應是死七表一浮者陽也指下尋按之不足舉之有餘再三尋之如大過脉在肉上行曰浮主咳𠻳氣促汗自出背膊勞倦夜卧不安脉訣曰如太過曰浮既曰舉之有餘矣如何而太過曰太過則浮洪浮緊浮弦之脉如何診之脉經並無如太過之文又尋與按不同按者重手於肌肉筋骨部也尋則或上或下或左或右隨脉部以尋之浮脉按之不足非尋之不足也按之不足舉有餘再再尋之指下浮藏中積冷榮中熱欲得生精用補虚寸浮中風頭熱痛闗浮腹脹胃虚空尺部見之風入肺大腸乾澁故難通二芤者陽也指下尋之兩頭即有中間全無舉指浮大而軟按之兩邊實中間虚曰芤主淋瀝氣入小腸主失血芤草名其葉類葱中心虚空故以指按芤草葉喻失血之脉芤之名不見於内經又曰安卧脉盛謂之脫血至仲景傷寒論曰脉弦而大弦則為減大則為芤減則為寒芤則為虚虚寒相摶此名為革亦未嘗以芤為定名但附見於革至王叔和始立芤脉脉經曰芤脉其象兩邊似有中間全無今脉訣乃曰兩頭則有中間全無則誤矣夫尺脉上不至闗為隂絶寸口下不至闗為陽絶若兩頭似有中間全無則是隂陽絶脉也安得為芤脉乎經曰榮行脉中是血在脉中行脉以血為形血盛則脉盛血虚則脉虚故芤脉中空者血之脫也芤脉先舉指時浮大而軟因按而中空今脉訣首言指下尋之非也仲景云脉浮而緊按之反芤其人本虚若浮而數按之不芤此人本不虛是皆於按上以見芤脉尋者在浮舉沉按之耳下倣此指下尋之中且虚邪風透入小腸居患時淋瀝尿血兼疼痛大作湯丸必自除諸家論芤皆為失血之診今曰邪風入小腸而淋瀝非其証也蓋是尿血之証矣寸芤積血在胸中闗内逢芤腸裏癰尺部見之虚在腎小便遺瀝血凝膿三滑者陽也指下尋之三闗如珠動按之即伏不進不退徃来前却流利輾轉替替然如數珠相似應指圓滑又曰漉漉如欲脱曰滑主肢體困弊脚手酸痛小便赤澁脉經曰輕手得之為浮滑重手得之為沉滑其象徃来流利應指圓滑若珠之隐指今脉訣曰按之即伏不進不退則是有浮滑而無沉滑也經曰一隂一陽者謂脉来沉而滑也是沉中亦有滑也故王裳言脉訣論表不及裏也且脉有獨見於一部者有通三部見者今曰三闗如珠動非也按之即伏不進不退則是脉不徃来而定豈所謂滑乎今取脉經所載而去其浮中而有力之語蓋此語只言浮滑亦一偏之言夫血多則脉滑滑之本體也若氣血和順其動不澁不急不緩和滑之脉為不病婦人為妊子今若曰滑為陽為病熱為實則此滑字當帶數及小實言之大抵此脉訣言脉之形狀徃徃未當今據經改正之而脉下所主之証多與本脉不類改之則不勝改姑置之可也滑脉如珠動曰陽腰中生氣透前腸脛酸只為生寒熱大㵼三焦必得康滑脉寸居多嘔逆闗滑胃寒熱不下食尺部見之臍似氷熱下焦飲水下焦聲瀝瀝月信不通尿血澁前脾藏歌云單滑脾家熱今云胃寒不下食何也脉經曰闗滑胃中有熱又云中實逆滑為熱實故不欲食食即吐逆可明為熱池氏謬言肝木尅脾土致寒弦為肝脉滑豈肝脉乎脉經曰尺滑不利少氣脉賦解義云男子尺滑主膀胱冷氣小腹急脹便旋利數又云尺滑主胞絡極冷月經不調直以滑脉為隂主冷不當不若脉經所謂尺滑血氣實婦人經脉不利男子尿血為得今脉訣云臍似冰則滑為隂証又曰飲水則滑為陽熱又曰瀝瀝作聲則滑為停水之証既言冷又言熱不知何謂今正之四實者陽也指下㝷之不絶舉之有餘浮中沉三候皆有力曰實主伏陽在内脾虚不食肢體勞倦桞氏曰實者氣結不通欠疎快意上部實則氣壅下部實則氣脹中部實中腕不快素問曰氣来實強是謂太過病在外氣来虚微是謂不及病在内此表裏虛實之診也今脉實而曰脾虛未敢信實脉尋之舉浮沉皆有餘伏陽蒸内致脾虛食少只縁生胃壅温和湯藥乃痊除舉有餘止言浮實故改之實脉闗前胸熱甚當闗切痛中焦恁尺部如繩應指來當為下痢疼腹脹小便都淋不禁忍如繩非實脉之比乃緊脉也故改之脉經曰尺實小腹痛小便不禁又云小便難少腹牢痛蓋氣来實強者太過之脉與淋瀝相應若云小便不禁則膀胱不固水泉不止為下焦劇寒之証矣脉經用當歸湯加大黄蓋因熱而用也小便不禁必𫝊寫之誤後云小便難者是也潔古於此一用薑附一用承氣為兩可之辭將以為寒乎以為熱乎五弦者陽也指下尋之不足舉之有餘狀若筝弦時時帶數端直以長如弦隠指曰弦主勞風乏力盗汗多出手足酸疼皮毛枯槁指下左右皆無從前中後直過挺然於指下曰弦此血氣收斂不舒之候脉訣以弦為陽傷寒論以弦為隂脉賦解義亦云弦滑雖屬七表皆主於隂活人書云若弦而洪數者為陽弦疾而沉且微細者為隂主拘急以愚觀之經曰隂中之陽肝也當為半隂半陽之脉脉訣曰指下尋之不足舉之有餘則是有浮弦而無沉弦也經曰脉沉而弦者主懸飲内痛是沉中亦有弦又曰時時帶數則是弦數二脉相兼非單弦脉也素問曰氣来耎弱輕虛以滑端直以長曰弦今不取輕虛以滑恐有弦數弦遲兼他脉之診故止以弦本狀端直以長為弦然有弦而細有弦而粗㸔在何部弦而耎其病輕弦而硬其病重大率弦脉急強血氣不和之所生也又有偏弦雙弦之診弦脉為陽端直以長狀若弦四肢更被氣煎煎三度解治勞風始退常須固濟下丹田弦浮數大四者皆勞也大者易治脉氣未衰可斂而正也弦者難治血氣已耗而難補雙弦則賊邪親脾尤為難治加數則殆矣内經曰勞者温之不可用解寸部脉緊一條弦胸中急痛狀繩牽闗中有弦寒在胃下焦停水滿丹田寸弦頭痛胸中痛左闗痃癖痛攣拘右闗有飲寒留胃尺弦腹痛腰脚拘既歌弦脉又言脉緊非也此歌脉証未是未盡今改作脉經曰寸弦心下幅幅微頭痛心下有水氣一云胸中拘急闗弦胃寒心下厥逆一云心下拘急此胃氣虚故爾尺弦小便痛小腹及脚中拘急一云臍下拘急六緊者陽也指下尋之三闗通度按之有餘舉指甚數狀若洪弦来徃有力左右彈人手既如轉索又如切繩曰緊主風氣伏陽上衝化為狂病内經難經未言緊也内經曰急不曰緊曰来而左右弹人手有緊脉之狀未有緊脉之名至仲景曰緊者如轉索無常又曰緊脉從何而来假令亡汗若吐以肺裏寒假令咳者坐飲冷水假令下利以胃中虚冷皆因寒而脉緊故脉急為寒諸緊為寒至王叔和脉則又増如切繩狀故愚合三書所論以形容之左右弹人手者緊脉来之狀左右弹人手也轉索無常者索之轉動不常在一處或緊轉在左或緊轉在右此舉指而得緊脉之狀也切繩狀者繩以兩股三股糾合為徽纒又以物切之其輾轉之緊得之於按指而見以指按脉猶如切繩合此三者論之方備脉經曰重手得之為沉緊輕手得之為浮緊故咳𠻳之脉沉緊則死中惡之脉浮緊則死今脉訣曰狀若洪弦此誤也緊為寒為痛弦為寒為飲洪為氣為熱主疾既殊治之亦異一槩言之為害甚矣且弦小於緊數大於弦洪則不然舉按盛大非與二脉同也又緊而遲為寒緊而數為熱若曰按有餘舉甚數則又類實脉若緊遲緊細又何以診又總曰三闗不曰三部又昧於寸尺之名今悉改之論此緊脉者或曰在筋肉之間通度或曰按之實數是有三部之通緊而無各部之獨緊有按之緊而無浮之緊皆一偏之辭仲景曰脉至如轉索者其日死為其緊急不軟無胃氣也轉索一也有死生之分宜詳辨之緊脉三闗數又弦上来風是正根元忽然強語人驚怕不遇良醫不得痊前言狀若洪弦今曰數又弦是見之不明而頻移其説以遷就也前云主風氣伏陽化為狂今去伏陽獨言風仲景及脉經皆曰諸緊為寒非可以為風狂伏陽之診難經曰重陽者狂豈緊脉為重陽乎重陽者謂陽部更有洪大滑長數等脉見耳内經曰隂不勝其陽則脉流薄疾并乃狂薄疾者極虚而急數并謂盛實亦非緊脉也緊脉闗前頭裏痛到闗切痛無能動隠指寥寥轉索無常入尺来繳結疼痛遶臍長手捧脉緊如轉索非隐指寥寥之狀繳結非痛之狀今改之李氏曰陽脉至隂部自然隐伏指下寥寥入来若在寸部則不寂寥以愚觀之脉随病而見不随部而改小腹痛必寒氣固結攻擊於下焦所以脉緊安有因在尺部而脉變形乎七洪者陽也指下尋之極大舉之有餘極大在指下来大去長而滿指曰洪主頭痛四肢洪熱大腸不通燥熱糞結口乾徧身疼痛指下尋之極大舉之有餘是浮沉皆大之象有類實脉矣脉經曰極大在指下不言舉按可以見洪之本狀診者自當隨其見於浮沉以參求耳極大在指下者指下前後左右四旁脉来皆盛大滿指是言本體之形大也来大去長言其来去之形大也洪脉根元本是陽遇其季夏夏月自然昌若逢秋季月及冬季月發汗通腸始得涼仲景曰立夏得洪大脉是其本位為應時之脉今曰季夏池氏遷就以為季夏心火漸退得脾土偃之其熱病自退若然則秋冬只在九月十二月得洪脉方可發汗通腸乎今季字皆改為月字洪脉闗前熱在胸當闗翻胃幾千重熱来衝更向尺中還若是小便赤澁脚痠疼八裏一微者隂也指下尋之極微冉冉尋之若有若無欲絶非絶又曰按之如欲盡曰微主敗血不止面色無光若有若無欲絶非絶所以形容微之不可見按之如欲盡謂必輕手診則可見重手按則欲盡而無也微與濡弱相類極軟而浮細曰濡極軟而沉細曰弱極細而軟無浮沉之别者微脉也微與濇細何以分細而又短於微来往蹇滯曰濇細而稍大常有曰細細而稍長似有似無曰微合五脉相類者詳分之則微脉可知矣陽微惡寒隂弱發熱微浮雖甚不成病不可勞脉經曰脉者氣血之候氣血既微則脉亦微矣沉微則補隂浮微則補陽調補之道以此為凖凡得是脉必羸弱氣虚為宜故風勞氣虚之病多得是脉桞氏曰脉分四時春夏發生長旺畏見此脉秋冬見尚庶幾又曰人禀氣以生若微脉太過陽虧氣乏何足以生指下尋之有若無漩之敗血小腸虚崩中日乆為白帶漏下時多骨肉枯微脉闗前氣上侵當闗鬱結氣排心尺下見之臍下積身寒飲水即呻吟微在尺為隂盛陽虚故為身寒不可飲水若飲水則兩寒相摶痛而呻吟也通真子曰多聲池氏曰身寒飲水李氏曰好飲冷水皆非也三沉者隂也指下尋之似有舉之全無緩度三闗狀如爛綿舉之不足按之有餘重按乃得在肌肉之下曰沉主氣脹兩脇手足時冷輕指於皮膚間不可得徐按至肌肉中部間應指又按至筋骨下部乃有力此沉脉也沉與浮相反與伏相近沉脉重按乃得於筋骨下部若伏脉則雖重按至筋骨下部亦不見必用指推開筋方可見脉難經曰伏者脉行筋下也内經曰推而内之推而外之皆是用指推筋脉以求之非一定其指於病人臂上俟其脉之自見也此持脉口訣也脉經曰沉者隂脉之始也其象按之至筋骨得之者是也其體沉潜深居諸脉之下有地之氣焉凡諸脉即沉而見則知其在隂而裏受之今脉訣曰按之似有狀如爛綿曰沉如此則沉弱沉微沉細之脉又當何如而診之甚失脉經之意矣經曰闗以後者隂之動也脉當見一寸而沉過者法曰太過減者法曰不及豈有按之似有狀若爛綿之不及也按之似即有舉還無氣滿三焦藏府虛冷氣不調三部壅通腸健胃始能除按之似有是沉微脉非獨沉也今改云按之即有沉為隂通腸宜温藥利之寸脉沉兮胸有痰當闗氣短痞痛難堪若在尺中腰脚重小便稠數色如泔氣短者氣不能相續似喘而實非氣上衝似呻吟而無痛乃氣急而短促也今曰痛難堪則非氣短脉經曰闗沉心下有冷氣苦滿吞酸則痛者氣痞不通而痛也三緩者隂也指下尋之往来遲緩小於遲脉去来亦遲小駛於遲又曰陽脉浮大而濡隂脉浮大而濡隂脉與陽脉同等曰緩主四肢煩悶氣促不安緩者二義去来亦遲小駛於遲每居中部或下部間柔軟而慢但小於沉脉兼之緩軟此有邪之診為不及之緩隂陽氣和陽寸隂尺上下同等同浮大而軟無有偏勝此無邪之診為隂陽和緩之緩緩與遲二脉相類緩脉大而慢遲脉小而衰緩者衛有餘而榮不足遲者隂氣盛而陽氣衰二診不同遲脉一息三至緩脉一息四至脉經曰緩脉小駛於遲今脉訣反云小於遲脉誤矣四肢煩悶氣促不安皆非緩脉之証来徃尋之狀若遲腎間生氣耳鳴時邪風積氣来衝背腦後三針痛則移緩脉闗前搐項筋當闗氣結腹難伸尺上若逢癥冷結夜間常夢鬼隨人四濇者隂也指下尋之似有舉之全無前虛後實無復次序細而遲徃来難且散或一止復来又曰短而止曰濇主腹痛女子有孕胎痛無孕敗血為痛脉来蹇澁細而遲不能流利圓滑濇者澁也與滑相反如刀刮竹竹皮澁又有節刀刮而行澁遇節則倒退有濇脉徃来難之意如雨沾沙沙者不聚之物雨雖沾之其體亦細而散有濇脉徃来散之意或一止復来是因澁不流利之止與結促代之止不同玉函經曰切脉定知生死路但向止代濇中取㸔取濇脉與止代此是死期之大槩濇脉與外有形証未可斷他殂大命若是形証與代同尺部見之皆死定黎氏曰代者止也一藏絶他藏代至為真死脉不分三部隨應皆是濇者三五不調如雨沾沙為精血不足之候與代相似然三秋診得濇而有胃氣為平脉右手寸口浮短而濇為肺正脉二者皆非死脉若尺寸俱浮緊而濇外証必發熱惡寒項強腰痛牽連百節俱痛乃太陽經傷寒汗之愈舉此數端以見濇脉與代脉不可例觀尺脉者人之根本濇為精血不足之候若獨於尺中見濇則死候也脉經曰濇脉之象徃来蹇滯行而多碍夫脉者資血氣而行血氣損傷榮衛行澁故脉亦澁脉訣曰按之似有舉之全無是有沉濇無浮濇經曰一隂一陽謂脉来浮而濇也則是浮中亦有濇豈獨沉有濇乎蓋浮而濇者榮衛傷沉而濇者精血損表裏之証不同故脉亦異豈獨有裏而無表乎難經曰前小後大前大後小其前後以尺寸論也今云前虛後實濇為少血其形蹇滯細短且散安能後實若後實則非濇矣其曰無復次序即内經所謂參伍不調上下如參春之脉是脉之亂脉亂則死矣今以脉經改之濇脉如刀割竹行丈夫有此號傷精婦人有孕胎中痛無孕還須敗血成濇脉闗前胃氣并當闗血散不能停尺部如斯逢逆冷體寒臍下作雷鳴五遲者隂也指下尋之重手乃得隠隠一息三至去来極遲曰遲主腎虚不安中風口喎脉浮而遲則生今脉訣於遲脉曰重手乃得是無浮遲之脉乎立脉之名曰遲以其比平人一息四至減去一至故也今曰隠隠果何所似且如珠絲曰隂衰如風吹毛曰肺死微甚欲絶伏甚不出則庶可隠隠形容之三至為遲何隠隠乎遲脉人逢狀且難三至為遲一息間遇其季夏不能痊神工診着知時候道是脾來水必乾或是脾虚或腎寒遲脉一息三至以至數之至為易見通真子曰遲脉屬腎腎水憂在土土季夏王潔古云遲本土也當倣此一脉為時勝故長夏勝冬土克水池氏曰季夏現遲季夏土正旺勝其腎水水必枯病不痊抑脾土滋腎水方為良工以愚考之内經曰脉遲者為藏病難經曰遲者隂也遲為在藏非脾旺脉亦非屬腎之脉假使季夏土旺脾能克腎不縁脉遲阿阿和大而緩是脾之正脉是因季夏時而旺不病之脉若素有腎虚之病則憂之若曰四時王脉能克所勝則是春肝脉旺必克脾土四時旺脉因序而見人人四時皆病矣今此脉訣之意蓋以夏月萬物盛大陽現之時而得遲脉為失時反証隂氣大盛脾者隂中之至隂也遲在脾則脾冷腎者亦隂也遲在腎則腎冷内經曰未有藏形於春夏而脉沉濇秋冬而脉浮大命曰逆四時今遲脉在夏亦逆四時也寸口遲脉心上寒當闗腹痛飲漿難流入尺中腰脚重厚衣重複也嫌單六伏者隂也指下尋之似有呼吸定息全無再再㝷之不離三闗極重按之着骨乃得又曰闗上沉不出又曰脉行筋下曰伏主毒氣閉藏三闗四肢沉重手足時冷伏脉者初下指輕按不見次尋之中部又不見次重手極按又無其象直待以手推其筋於外而診乃見蓋脉行筋下也若如常診不推筋以求則無所見昧者以為脉絶矣芤脉因按而知伏脉因推而得伏與沉相似沉者重按乃得伏者重按亦不得必推筋乃見也若重按不得推筋着骨全無則脉絶無而死矣脉訣曰指下尋之似有則非伏也呼吸定息全無則脉絶也再再尋之不離三闗三闗三部一寸九分之位也豈他脉之診乃離捨三闗乎此脉訣言伏脉之狀最謬隂毒伏氣切三焦不動榮家氣不調不問春秋與冬夏徐徐發汗調理始能消伏為積聚有物為積有榮積有衛積有藏積隨所積而施治可也今曰不動榮家氣不調是先治榮血而氣自調也必也治榮積而見伏脉者方可若夫氣積及食物積藏積又當各治其本且氣為是動血為所生者難經曰氣留而不行者為氣先病血滯而不濡者為血後病故先為是動後為所生病以此論之當先調氣而血自順亦有血先病而氣後病者隨病施治可也難乎執一其因物聚者又必以所惡者攻之以所喜者誘之亦不専於先動榮也通真子曰伏脉不可發汗更宜消息誠哉是言内經曰其有邪者漬形以為汗其在皮者汗而發之仲景曰脉浮者病在表可發汗又曰表有病脉當浮今伏脉乃在裏之病豈宜發汗雖曰徐徐其動表一也非其治也潔古又引陽盛隂虛汗之則愈以升麻湯麻黄湯附子細辛麻黄湯為治亦非也難經所云仲景所述曰陽盛隂虚者謂傷寒之邪在表為陽在裏為隂邪入皮膚惡寒發熱是表虚而受邪曰陽虚未𫝊入裏裏未受邪故曰隂盛故云汗之則愈非論伏脉為隂盛也假使隂毒為病正當隨淺深用温藥祛逐豈可發汗耶積氣胸中寸脉伏當闗腸癖常㝠目尺部見之食不消坐卧非安癥瘕攻痛還破腹七濡者隂也指下尋之似有按之依前却去極軟而浮細輕手乃得不任尋按曰濡主少氣五心煩熱腦痛耳鳴下元冷極有餘於上曰浮既浮而細曰軟浮而軟細曰濡按之無有舉之則浮細而極軟必輕手乃可得脉經曰如帛衣在水中帛漫在水虚浮見於水面若用指按之則隨手而軟散不與手應此濡脉之狀也濡與遲弱相近一息三至隨浮沉而見曰遲極軟而浮細輕手乃得不能沉曰濡輕軟而沉細按之乃得重按欲絶指下不能起伏不能浮曰弱濡弱遲微之脉皆氣血之不足者也大病後或産婦喜見此等脉平人強人忌見之更隨時隨病消息之脉訣曰指下尋之似有與言伏脉同何是何非耶且諸脉之應皆一来一去如曰来疾去遲曰来盛去不盛以别鈎脉外實内虚之診今曰按之依前却去其狀果何如耶内經曰軟脉經曰濡同一脉也難經曰春脉弦濡弱而長按之濡舉之来實者腎也沉濡而滑曰石是皆兼他脉以濡在中和之為胃氣之本為平脉旺脉若濡脉獨見則病脉也内經曰心脉耎散當消環自已肝耎散病溢飲胃耎散病食癉脾耎散食不澤足胻腫腎耎散病少血其言耎散脉與摶堅而長對言病也獨言當作故以氣来虚微来強實對言之非所謂濡與虚弱之診也按之似有舉之無舉全無力按如無髓海丹田定已枯四體骨蒸勞熱甚藏府終𫝊命必殂脉訣首句全非濡診活人書曰按之似無舉之全無力曰濡今從之濡脉闗前人足汗虚自汗當闗少氣精神散尺部綿綿却惡寒骨與肉踈都不管八弱者隂也指下尋之如爛綿相似輕手乃得重手乃無怏怏不能前極軟而沉細按之如紀指下曰弱主氣居於表生産後客風面腫弱者扶持不起之狀不能起伏不任尋按大體與濡相類濡脉細軟而浮弱脉則細軟而沉以此别之病後見此脉為順強人平人見之為損為危獨見一部或二部猶庶幾三部六部見之甚矣脉經論弱云按之乃得舉之無有今脉訣云輕手乃得重手乃無與經相反今改之又弱為虚候氣血損減今云氣居於表果何証乎表病脉必因浮而見今弱脉沉細在下何以診表素問曰面腫曰風不拘於産後也弱脉亦難以驗風三闗脉行怏怏不能前只為風邪與氣連軟細而沉似爛綿少年得此須憂重老弱逢之病却痊闗前弱脉陽道虚闗中有熱氣多疎虚熱胃虚疎若在尺中隂氣絶痠疼一變上皮膚陽氣少骨煩發熱痛難居脉經曰闗弱胃氣虚胃中有客熱脉弱為虛熱作病有熱不可大攻之熱去則寒起矣池氏曰闗乃隂陽分處脉弱則隂陽隔絶主氣喘李晞范因之今按氣喘者脉必實脉弱則氣乏不足以息今依脉經改之栁氏曰氣虛羸弱弱脉乃見寸弱為陽氣虛尺弱為隂氣虛闗弱為胃虛仲景曰諸弱發熱乃弱為陽虛虛而發熱非實熱也大抵陽少隂多皆為不足之候脉經曰弱為虛為悸内經曰脉弱以滑是有胃氣命曰易治脉小弱以濇謂之乆病同一弱也以滑濇相兼而易診脉經曰尺弱陽氣少發熱骨煩又云少血脉經曰骨煩者腎主骨髓也脉訣作皮膚乃肺之合非腎所主今改之九道通真子曰七表八裏為隂陽正脉外有九種脉相通而見者經所謂脉来浮滑而長沉濇而短浮大而牢之類是也以愚觀之脉無正不正之定名也為邪為病而見則二十四字皆不正之脉因時而旺隨藏而應則皆正脉也脉合隂陽難以七表八裏為隂陽正脉難經曰浮滑長皆陽脉沉濇短皆隂脉非别以長短為隂陽正脉之外也是長短與浮沉滑濇同為隂陽也又曰外有九種脉相通而見故曰九道且脉之相通乃衆脉參互為一以示証也二十四字除浮沉結促代伏居於上下止於緩急不能相通其他皆相通難經曰一陽一隂謂浮而濇是八裏通乎七表也一隂一陽謂沉而滑是七表通乎八裏也内經所載仲景所論多通衆脉而言病脉經二十四字有散數無短長脉訣去散數増長短亦以足二十四字脉經論二十四字通為一處亦無次序之定蓋脉隨變而見但宜以陽脉從陽類隂脉從隂類不可以一浮二芤為定序且三至為遲六至為數遲隂在藏數陽在府經文皆對言也今取遲去數其可乎是知脉不可以二十四字為定數也亦不可立表裏道之異名也陳氏沈氏並用散數為九道用脉訣九道之名數而不取長短亦非也今増散數二脉於後以足脉經之所論而不去長短者脉之所當述者也既不拘於表裏道二十四字之數則脉之以一字立名皆詳論可也或曰子既辨表裏道之非不刪而述其舊文何也曰此朱文公作孝經刋誤程子述大學親民之例也不刪者存其舊也用墨圈者當刪者也辨其下者使人皆知其非不復為舊文所惑不刪之刪也一長者陽也指下尋之三闗部如持竿之狀舉之有餘曰長過於本位亦曰長主渾身壯熱坐卧不安從尺至闗連寸口直過如横竿之狀此三部之長脉過於夲位謂或尺或闗或寸過於一指之外此各部之長脉欲知其病則必於浮沉遲數大小之間求之若不大不小不浮不沉不遲不數則氣自治而無病經曰長則氣治是也大概平人病人脉長為吉深且長壽脉也尺脉長根深蔕固心脉長神氣有餘内經心脉摶堅而長病舌卷不能言至腎脉摶堅而長病折腰此六脉者非以長為病以摶堅相合為病也春肝脉軟弱輕虛而滑端直以長肝脉如循長竿末稍曰平如循長竿曰病有餘而過故也長脉迢迢度三闗指下来時又却還陽毒在藏三焦熱徐徐發汗始能安通真子曰此云来時又却還者似一隂三陽之脉愚曰非也来而還只可謂脉之来去然諸脉皆如是若不能自還則代而死矣一隂三陽者謂脉来浮滑而長時一沉也是四脉共見也潔古曰此陽明脉尺寸俱長當汗陽化氣也今按假使是陽明証亦難専於發汗正陽陽明當下太陽陽明當汗少陽陽明隨証解利當依表裏分汗下二短者隂也指下尋之不及本位曰短主體虛惡寒腹中冷氣宿食不消寸口尺中皆退促附近闗中見一半如龜縮頭曳尾之狀以其隂陽不及本位故曰短若闗中短上為寸脉下不至闗下為尺脉上不至闗是隂陽絶脉此皆不治決死故闗中不以短脉為診脉經曰短脉之象應指而迴不能滿部浮而短者榮衛不行沉而短者藏府痞塞短與長對知長則知短矣短脉隂中有伏陽氣壅三焦不得昌藏中宿食生寒氣大㵼通腸必得康通真子曰脉訣以一陽三隂脉来沉濇而短時一浮乃云有伏陽耳今按脉訣單論短為隂中伏陽蓋以短為隂脉短為氣病氣不得舒暢則陽氣鬱伏於内非論沉濇短浮四脉共見也内經曰疎其血氣令其條達而致和平今曰大㵼通腸亦當隨病淺深用藥可也三虚者隂也指下尋之不足舉之亦然遲大而軟按之無力隐指豁豁然空曰虚少力多驚虚脉因按而知其虛其診法與芤同皆以按而見浮大而軟按之中無旁有為芤遲大而軟按之隠指豁豁然空為虛内經曰脉虛血虛二脉皆因血而見失血則中無血虛則中空脉訣言尋之不足舉指亦然乃微濡之脉非所以形容虛也虛與實對實於中為實故浮中沉皆有力内不足為虛故按之豁豁然空恍惚心中多愕驚三闗定息脉難成按之無力脉虛輕血生虛藏府生寒熱煩熱補益三焦便得寜四促者陽也指下尋之極數并居寸口又曰来去數時一止復来曰促漸加則死漸退則生促脉尺微闗細寸口獨實而滑數并居於上或来去數時一止復来黎氏曰促脉雖盛疾必時一止復来者如趨之蹶也故徐疾不常促脉前来已出闗并居寸口血成班証危難忽然漸退人生也若或加時命在天血成班非促脉証五結者隂也指下尋之或來或去聚而却還脉来緩時一止復来無常數又曰脉来動而中止更来小數中有還者反動曰結主四肢氣悶連痛時来遲而小駛為緩應指暫歇為止緩而止為結通真子曰據經謂往来緩時一止復来為結其言是也此云或来或往聚而却還與之稍異来去者脉之常也聚而還何以見脉之結今依仲景所論改之脉經只云来緩時一止難經又云無常數今依難經増之蓋止而復来數至間或三兩至或又一止無常數若有常數如五動一止又五動一止依數而止則為死脉可依止數尅死期矣詳見下代脉辨仲景曰藹藹如車蓋曰陽結乃陽氣鬱結於外不與隂氣和雜也纍纍如循長竿曰隂結乃隂氣鬱結於内不與陽氣和雜也又曰脉浮數能食不大便此為實曰陽結脉沉遲不能食身體重大便反鞭曰隂結亦以隂陽氣偏結因兼証而分之不以脉止為結也内經曰結陽者腫四肢四肢者諸陽之夲也結隂者便血隂主血也二陽結謂之消謂大腸胃熱三陽結謂之隔謂小腸膀胱熱三隂結謂之水謂脾肺寒一隂一陽結謂之喉痺謂心主三焦熱是亦分隂陽之結也王氏脉經蓋因仲景之文於脉緩止却為結陽數止却為結隂悞甚詳述在代脉下其實脉訣之結脉為隂與促脉為陽相對非若内經與仲景所言有隂陽之分也若必論隂陽結則緩而止為結隂數而止為結陽方允當積氣生於脾藏旁大腸疼痛卒難當漸宜稍㵼三焦火莫漫多方立紀綱六代者隂也指下尋之動而復起再再不能自還動而中止不能自還因而復動曰代主形容羸瘦口不能言代者此脉已絶他脉代其至之義一藏氣絶而他藏之氣代而至也代與止異者止者按之覺於指下而中止代者忽還尺中停乆方来則是歇至數動止而復来因其呼吸隂陽相引乃復動也今脉訣曰動而復起則不代矣是不明動而中止為代也再再不能自還之下却不言因而復動是不能自還之後脉絶不来矣今以仲景原文改之内經曰代則氣衰脾脉代注云耎弱也仲景曰傷寒脉結代心動悸炙甘草湯主之皆不以代為死脉也王氏脉經始曰脉結者生代者死仲景言結代脉曰脉按之来緩時一止復来名曰結又脉来動而中止更来小數中有還者反動名曰結隂也脉来動而中止不能自還因而復動名曰代隂也得此脉者必難治王氏脉經述之而與仲景本文有差仲景兩明結脉總曰隂也脉經分前一論来緩時一止名曰結陽多添一陽字於後一論中有還者反動改作不能自還舉之則動却依夲文曰結隂也以前為結陽則脉緩非陽也此蓋脉訣所謂結脉以後為結隂則脉數乃陽也此蓋脉訣所謂促脉且不能自還與代脉同何以為結脉且結代同而中止皆同自還為結不能自還為代正以分二脉之異今混而同之不可也代則血氣衰虛不能相續因其呼吸相引復動此所以代為難治活人書云隂盛則結主胸滿煩燥陽則促主積聚氣痞憂思所成大抵結促二脉雖時一止為病脉非死脉也代則真死矣或曰死脉必代而代脉未必皆死者止也人見其脉動摇来往畧有一止便以為代便以為死鮮有不失者蓋代脉固以其有止而有止者未可便以為代何也諸脉有止者四濇促結代也脉細而遲往来難時一止者為濇脉来數時一止者為促脉来緩時一止者為結凡此三者均謂之止而其所以止者迥然不同為病亦異而皆非死脉也甄别於此毫髪不爽見其所謂止者不過於濇促結中之止則隨脉生病真見其止如代中之止然後斷之為死則不失矣代脉之止其止有常數而不忒如十動一止則數十止皆見於十動之後如二十動一止則數十止皆見於二十動之後及加進亦如是方為代脉王氏脉經於代脉依仲景却改脉来作来數則又混促脉之止必全依仲景夲文方是代脉時時動若来動而中止不能還再而復動似還無復動因為代脉㸔三元正氣隨風去魂魄寘寘何所拘井沉旦夕間曰動若来則不止也一作動若浮尤悖理潔古亦隨繆解之何也曰似還無於脉狀何似故改之七牢者隂也指下尋之則無按之則有似沉似浮實大而長微弦曰牢主骨間疼痛氣居於表尋之則無按之則有則沉脉也可以言牢脉所見之位而失言牢脉之本狀似沉似伏者牢脉所居之位也實大而長微弦者牢脉之形也脉經曰有似沉伏沈氏分言似沉似伏尤為明著又曰低而不浮曰沉按之極下曰伏隠指偪偪曰實滿指洪盛曰大過於本位曰長緊而直曰弦兼是數者為牢脉黎氏曰牢者堅也固圍之象氣之鬱結故如此桞氏曰牢實不轉移主有積聚主疼痛不移其處得此一脉病邪牢堅其病難愈沈氏曰隂陽革否其氣沉伏在下固結不移其氣欲上出而不得故曰革也今按古今多以革與牢混論素問云渾渾革至如湧泉綿綿其去弦絶死曰革至如湧泉流出之甚也綿綿其去流而不返義如絶弦者若弓弦琴瑟弦斷絶不可再續義故云死生貺曰革脉渾渾如湧泉謂出而不返也為隂氣隔陽又為溢脉溢脉蓋自尺而出上於魚際離經無根夲又有覆脉自寸口下退過而入尺皆必死此等脉見於兩手或一手難以逐部求或曰牢脉即黄帝之所謂革脉千金翼亦以革為牢是以革牢同一義然内經渾渾革至如湧泉則此革不與脉經沉伏之革同矣然則牢革兩義也難經曰牢而長者肝也牢隂長陽因沉而得為肝之平脉又曰脉之虛實濡者為虛緊牢者為實以邪氣甚為實也此牢也仲景曰脉弦而大弦則為减大則為芤减則為寒芤則為虛寒虛相摶此名為革婦人則半産漏下男子則亡血失精此革也機按牢主邪氣實革主精血虛或又曰如按鼓皮鼔皮可以言革而於實大弦長難以取象脉經曰三部脉革長病得之死卒病得之生兼病以斷也難經曰病若吐血復鼽䘐血者脉當沉細反得浮大而牢者死脉病相違也仲景曰寒則牢堅脉書往往以革牢為一有牢則無革有革則無牢究而言之諸書所謂牢者堅也緊牢為實仲景所謂革者虛寒相摶也脉形脉理二者不同不可混也因牢論革及此若内經渾渾革至云者又别作一様㸔可也脉入皮膚辨息難實大弦長沉伏間時時氣促在胸前只縁水火相刑尅若待痊除更問天牢脉居沉伏之位非入皮膚之浮部也牢以脉形固結鬱而在下不與遲數辨息多少以立名故改之牢脉亦難以為水火相刑之象五行各有相刑皆有死症八動者隂也指下尋之似有舉之還無再再尋之不離其處不往不来若數脉見於闗上上下無頭尾如豆大厥厥摇動曰動主體弱虛勞崩中血痢仲景曰動脉若數脉見於闗上上下無頭尾如豆大厥厥動摇王氏脉經依闕文而去若數脉及上下五字止云見於闗上無頭尾如豆大厥厥動摇夫動必因數而後見此五字不可除也脉訣並不遵依却自云㝷之似有舉之還無乃微弱沉之狀動脉厥厥動摇出於衆脉豈舉之還無乎不離其處果何處也動見於闗不能如衆脉通三部而見内經曰脉不往来者死若不徃不来則脉定而死矣衆書以動為陽脉訣以動為隂此脉居闗上隂陽相摶為動當以陽動為陽隂動為隂方當内經曰手少隂脉動甚者妊子也謂手少隂俞神門穴中脉動甚為有妊之兆非言動脉之狀言動脉始於仲景曰隂陽相摶名曰動陽動則汗出隂動則發熱形寒惡冷此三焦傷也成無已曰方其隂陽相摶而虛者則動陽虛則陽動故汗出隂虛則隂動故發熱如不發熱汗出而反形冷惡寒為三焦傷陽氣不通龎安常曰闗位占六分前三分為陽後三分為隂若當陽連寸口動而隂静法當有汗而解素問曰陽加於隂謂之汗若當隂連尺動而陽静則發熱素問曰尺麄為熱中若大汗後形冷惡寒者三焦傷此是死証動脉只在闗上見惟龎說分明成氏又曰陽出隂入以闗為界闗為隂陽之中也若數脉見闗上無頭尾如豆大動摇者是隂陽之氣相摶也厥厥動摇者自為動摇不與三部混也如人在衆中不與衆合名之厥厥沈氏曰陽動者陽不能衛於膚腠故汗出也隂動者隂不能榮於肌肉故發熱又仲景云陽微則惡寒隂弱則發熱是也動脉根源氣主隂隂陽相摶形三闗指下礙沉沉闗中如豆動摇頻血山一倒經年月智士名醫只可尋為病為驚載脉經動脉見闗上不見於三闗厥厥動摇不沉沉礙指下也池氏承訛謬解故改之内經曰隂虛陽摶謂之崩隂脉不足陽脉盛摶則内崩血流下此動脉為血崩者即仲景所謂隂動也隂虛内損動數見焉豈非陽摶乎九細者隂也指下尋之細細如線来往極微小大於微常有且細曰細主足脛髓冷乏力少氣脉經曰細者隂也直細而軟若絲線之應指主血少氣衰有此症則順非此而得之為逆故吐䘐血得沉細則生蓋血行脉中血既減少脉所以細也然雖血少未至於失血故脉出於細未至於無血失脉亦失故芤主失血是知芤為失血細為血少今脉訣言細脉乃云来往極微則微之又微非細矣今改之乏力無精脛裏酸形容憔悴髪毛乾如逢冬季經霜月不療其疾必自痊冬季後陽氣生或可復其生理耳亦不可言不療自痊今増散數二脉以足脉經之本㫖數者陽也一息六至又曰去来促急為數經曰數則為熱必審其浮沉知其熱在表裏察其大小知其熱之盛衰亦有如數之脉經曰脉至如數令人暴驚且細詳之沈氏曰以隂陽言數為陽脉以藏府言數為府病論邪則為熱論病則為虛若夫微數之脉傷寒則謹不可汗無病則謹不可勞此前賢之格言内經曰數為煩心惟小兒之脉一呼吸間八至而細數者為平耳散者大而散者是也氣失血虛有表無裏故脉散也沈氏曰散者不聚之名仲景曰傷寒咳逆上氣其脉散者死也若脉有邪氣風也難經曰浮而大散者心也最畏散脉獨見獨見則危矣桞氏曰是散漫無統紀無拘束之義指下見得来動一二至中又至一至更不曽来往整齊或動来即動去或来至多去至少或去至多来至少是解散不收聚精血走作根夲脱離不佳之兆若産婦得之則生子孕婦得之為墮傷尋常心脉及夏月最不宜獨見此脉脉訣刋誤集解卷上
