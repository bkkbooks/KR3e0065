body:
  text: 脉訣刊誤卷下元戴啟宗撰經曰知者一言而終不知者流散無窮脉之為說前已論辨于各脉之下今又以分合偶比類五字以經綸錯綜之庶無惑矣分有脉之形分謂脉各有形状當先明辨便了然不疑大小浮沉滑濇可以指别迥然各異辨之于毫釐之間使其形不相混如舉有按無為浮按有舉無為沉之類有脉之證分謂脉之一字獨見為証如寸浮中風頭痛之類不雜他脉獨為証今脉訣歌在各脉之後者是也或獨見一部或通見三部或兩手俱現合有合衆脉之形為一脉者謂如似沉似伏實大長弦之合為牢極軟浮細之合為濡之類有合衆脉之形為一証者謂浮緩為不仁浮滑為飲浮洪大而長為風眩顛疾有二脉合者有三四脉合者大抵脉獨見為証者鮮參合衆脉為証者多今脉訣獨取平三闗一脉論証而遺其合衆脉以論証者今各補註于後以全其脉証此條補註節抄不及備録且一脉雖獨見而為証亦不一如浮為風又為虚又為氣各不同此又一脉之証合也必備論之以証相參而考脉則思過半矣潔古張元素醫學啓源云右寸大腸肺脉之所出也先以輕手得之是大腸屬表後以重手得之是肺屬裏肺合皮毛肺脉尋皮毛而行持脉指法如三菽之重按至皮毛而得為浮稍稍加力脉道不利為濇又稍加力脉道縮入闗中上半指不動下半指㣲動為短此乃浮濇而短肺不病三脉也肺脉本部在于皮毛之上見于膚表是其浮也入于皮毛之下見于血脉肌肉之分是其沉也六部倣此此診之定法可以合衆脉之形矣偶脉合隂陽必有偶對經曰善為脉者必以比類竒恒從容知之浮沉者脉之升䧏也浮升在上沉降在下為諸脉之根本為隂陽之定位為表裏之定診浮法天有輕清在上之象沉法地有重濁在下之象浮為風為虚體髙而氣浮也沉為中堅為内藴體聚而不散也論諸脉者必先此二脉遲數者脉之緊慢也脉以四五至為平减一至為三至曰遲増一至為六至曰數難經曰遲隂為在藏數陽為在府遲則為寒數則為熱亦偶言之也中藏經曰數在上陽中之陽在下隂中之陽遲在上陽中之隂在下隂中之隂數在中則中熱遲在中則中寒寒用熱助熱用寒助本乎隂陽也虚實者脉之剛柔也按之浮中沉皆有力為實遲大而軟按之豁豁然空為虚虚實之由皆以有餘不足占之故以按而知經曰其氣来實強為太過病在外氣来虚㣲為不及病在内血實脉實血虚脉虚亦皆偶而言之論表裏虚實必以此二脉中藏經曰脉舉之滑按之㣲看在何部以㫁其藏又按之沉小弱㣲短濇軟濡俱為藏虚其脉舉按皆盛者實也又長浮數疾洪緊弦大俱曰藏實其脉浮而實大者府實也輕手按之滑重手按之平者府虚也左右寸口沉結實大者上實也左右寸弱而㣲者上虚也左右尺脉伏而濇者下實也尺中脉滑而濡者下虚也尺中㣲濇短小者俱屬下虛也許叔㣲曰浮緩為表虚傷風解肌浮緊濇有力為表實傷寒發汗脉沉無力為裏虚可温沉而有力緊實為裏實可下此論傷寒表裏虚實凡此皆非單論脉虚實之理長短者脉之盈縮也脉盈過于本位曰長脉縮不及本位回短長有見于尺寸有通見于三部短只見于尺寸盖必質于中而後知過于中為長不及于中為短經曰長則氣治短則氣病脉有三隂三陽而長短在其中是亦偶而言之又曰人長脉長人短脉短又因人形體而别滑濇者脉之通滯也脉通則流利無礙曰滑脉滯則蹇澁不流曰濇内經曰滑者隂氣有餘濇者陽氣有餘難經三隂三陽滑濇對舉千金曰滑者多血少氣濇者多氣少血皆偶言也以二義攷之隂氣有餘者血多也血多則氣少脉者血之府也榮行脉中今血多故流利圎滑陽氣有餘者氣多也氣多則血少故艱澁而散一止復来先明氣血之多少斯知滑濇之理洪微者脉之盛衰也血熱而盛氣随以溢滿指洪大衝湧有餘洪為脉之盛也氣虚而寒血随而澁應指㣲細欲絶㣲為脉之衰也緊緩者脉之急慢也緊為傷寒寒則傷榮榮受寒邪脉絡激摶若風起水湧既如切䋲又如轉索緩為風結皮膚不仁榮血不流衛氣獨行不能疾速血虚頑痺脉為緩慢榮受寒邪則脉緊榮血蹇澁則脉緩二脉由榮而見沈氏曰緊為隂隂主寒寒則物斂而有拘攣之象又主痛諸痛皆原于寒又主宿食由胃虚挾寒不能腐化故也緩為陽熱主血虚血虚則脉體弱又主氣虚氣虚則脉體無力又主風風者陽邪主舒啟縱弛故也動伏者脉之出處也出見于外故數見闗上如豆大出類而異于三部者動也虚藏于内不見其形脉行筋下者伏也二者猶人物之出處也結促者因止以别隂陽之盛也陽盛則促脉疾而時止隂盛則結脉徐而時止雖有止非死脉也代則死脉也促結為偶而代無對脉不可以偶對言者不敢鑿也三因方盡為偶名而以弦弱芤㣲濡革散代亦為偶非一隂一陽也因知其不可盡以偶言也必一隂一陽而後可偶然又有脉偶而同見者如大小緩急疾徐疎數之類經曰前大後小前小後大来疾去徐来徐去疾去不盛来反盛去盛来不盛乍大乍小乍短乍長乍踈乍數是二脉偶見也亦有兩手偶見者如左大右小左小右大之類比比者所以明相類之脉比其類而合之因其疑也辨其異而分之决其疑也内經曰脾虚浮似肺腎小浮似脾肝急沉似腎此皆三者之所亂也然從容得之以知其比類也注云以三藏相近故脉象參差而相類是以三惑亂為治之過失矣必從容比類而得三藏之形状故浮緩曰脾浮短曰肺浮而滑曰心急緊而散曰肝摶沉而滑曰腎不能比類則疑惑彌甚是以脉經立相類之脉今立比字為綱使從容比類先明于未診之先免交疑于持脉之際脉經曰浮與芤相類一曰與洪相類弦與緊相類滑與數沉與伏㣲與濇軟與弱緩與遲革與實千金云牢與實今細詳之有弦細有芤虚有濡芤有洪散有牢伏有數脉同類者洪散俱大也而散無力濡弱同極軟而細也有浮沉之異㣲細俱小也而㣲無力芤類浮也按之邊有中無濡類芤也按之如無沉伏牢同居下也按有餘曰沉按實大長弦曰牢按不見脉行筋下曰伏弦細同直長之形同收斂之義也亦有大小之分弦如弦之直細如線之細遲緩同慢也有三至四至之異大慢小衰之别濇㣲易識也何疑乎相類牢與實革與實非相類也脉賦云洪與實形同彷彿是相類也洪實同有力而大也洪分沉浮之異實合浮沉而皆有力弦與緊之異弦左右無而中直如弦緊左右弹而有如轉索雖相類而甚相逺也又有數脉之相類如濇促結代同一止也而全不同他如濡弱遲如芤虚如㣲細濡弱濇已辨于各脉條下類易曰方以類聚又曰本乎天者親上本乎地者親下則各從其類也内經曰脉合隂陽又曰察之有紀從隂陽始衆脉隂陽各以類從知乎此則七表八裏九道之非不膠固于先入之言矣㫖哉蔡西山之論也曰凡中脉不大不細不長不短不浮不沉不滑不濇應手中和意思欣欣難以名状者為胃氣其太過為大為長為實為堅為強為浮為芤為滑為洪為急為促者皆陽也其不及為細為短為虚為軟為沉為結為伏為濇為㣲者皆隂也陽摶隂為弦隂摶陽為緊隂陽相摶為動寒虚相摶為革隂陽分離為散隂陽不續為代難經曰諸陽為熱諸隂為寒數則為熱遲則為寒浮為表沉為裏三因方云博則二十四字不濫絲毫約則浮沉遲數總括綱紀故知浮為風為虚沉為濕為實遲為寒為冷數為熱為燥風濕寒熱屬外虚實冷燥屬内内外既分三因頓别三㸃劉立之亦以浮沉遲數四字為綱以教學者浮風沉氣遲冷數熱分别三部為証此誠初學入門然必博學反約然後能知脉之妙若遽以此自足則今汝畫矣故述此于分合比偶類五字之後診雜病生死候歌五十不止身無病數内有止皆知定四十一止一藏絶却後四年多没命三十一止即三年二十一止二年應十五一止一年殂以下有止看暴病柳氏曰以動數候脉是喫緊語候脉須候五十動知五藏之氣有無缺失今人手指到病人腕臂便以為見了殊不知五十動見豈弹指間事相習成風以疾速為神竒廬山劉立之號曰三㸃以手中指㸃人三部脉生死吉凶多驗學徒相傳亦用之劉果三㸃之神耶抑亦聲色得之耶色可傳脉不可傳古人以切脉為上工如扁鵲飲上池水能洞見人藏府間病如華陀刳骨剔胃是豈切脉而得之歟後世聖神之術不常有所當學者診脉以知内參以問証察言觀色以知外則可耳脉經曰脉來五十投而不止者五藏皆受氣即無病四十投而一止者一藏無氣却後四嵗死以至十投一止者四藏無氣嵗中死其言㡬藏無氣以分别㡬嵗之死期予竊疑之内經曰腎絶六日死肝絶八日死心絶一日死果此藏氣絶又安䏻待四嵗三嵗乎大抵五十動者脉之大數要必候五十動不可不及五十動而遽不候也或問候止脉何處數起曰得止脉後再從始至脉數起看得㡬至而止為數診暴病歌兩動一止或三四三動一至六七死四動一止即八朝以此推排但依次此是十動内有止脉者然難必謂暴病有此久病亦有見此者但當以至數定死期不必專于診暴病也形脉相反歌健人脉病號行尸病人脉健亦如之審言之短長肥痩並如此細心診候有依稀脉病相違亦若斯内經曰形氣有餘脉氣不足死脉氣有餘形氣不足生仲景曰脉病人不病名曰行尸以無王氣卒眩仆不識人則死人病脉不病名曰内虚以無穀神雖困無苦今脉訣曰亦如之是與行尸同也故改之仲景曰肥人貴浮痩人貴沉肥人當沉今反浮故貴之痩人當浮今反沉故貴之脉經曰當視其人大小長短皆如其人之形性則吉反之則為逆肥人脉細小如絲身澁而脉来往滑身滑而脉来往澁皆死前言形脉相反又有脉病相反不可不備舉難經所謂脉不應病病不應脉者是也素問曰形盛脉細少氣不足以息者死形瘦脉大胸中多氣者死形氣相得者生三五不調者病形肉已脫九候雖調猶死病熱脉静泄而脉大脫血而脉實病在中脉實堅病在外脉不實堅者皆難治難經曰病若閉目不欲見人脉當得肝脉弦急而長而反得肺脉浮濇而短者死病若閉目而渇心下牢者脉當得緊實而數反得沉濡而㣲者死此類皆脉病相反脉訣所缺今改此歌末句以著之診四時病五行相克歌春得秋脉定知死死在庚辛申酉裏夏得冬脉亦如然還于壬癸為期爾嚴冬診得四季脉戊己辰戌還是厄秋得夏脉亦同前為縁丙丁相刑尅季月季夏得春脉克在甲寅應病極直逢乙卯亦非良此是五行相鬼賊内經難經並以天干五行論克賊脉訣又以地支並論若用支干上下純為鬼邪之日為死必六十日方遇若死期之近何以克之不若以天干一旬為期依内經為㫁不失之拘也内經又曰夫邪氣之客于身也以勝相加至其所生而愈謂我所生者至其所不勝而甚至其所生而持謂生我者自得其位而起必定五藏之脉乃可言間甚之期訣四時虚實五邪歌一藏有五邪今只取虚實㣲三邪作歌及立名又只取二邪而遺其一今改作診五邪歌春得冬脉只是虚兼令補腎病自除若是夏脉縁心實還應瀉子自無虞夏秋冬月皆如是所勝為㣲不勝賊在前為實後為虚春中若得四季脉不治多應病自除今添兩句云正邪自病通成五四時五蔵倣斯圗難經曰虚則補其母實則瀉其子虚當補母人所共知千金曰心勞甚者補脾氣以益之脾旺則感于心矣若乃勞則補其子人所未聞盖母生我者也子繼我而助我者也方治其虚則補其生我者與郭氏塟書本骸得氣遺體受䕃同義方治其勞則補其助我者與荀子所謂未有子富而父貧同義此補虚與治勞之異也傷寒歌傷寒熱病同看脉滿手透闗洪拍拍出至風門遇太陽一日之中見脫厄過闗㣲有慢騰騰直至伏時重候覔掌内迢迢散漫行瘥軋㾉疔多不的大凢當日問途程遲數洪㣲更消息熱病須得脉浮洪細小徒費用神功汗後脉静當便差喘熱脉亂命應終此歌未足以括傷寒之綱要也三百九十七法一百一十三方學者以仲景傷寒論為祖成無已注及明理論許叔㣲百証百問薛宋二氏鈴則又發明仲景之㫖奥外此則蘭臺寳鑑金匱要畧無求子百問南陽百問龎安常王仲弓盧昶韓祗和孫用和及諸家之書遍覧參攷守之以正條用之以活法方為盡善此歌其能盡乎予又病世之醫者往往以活人言自足不復祖之仲景之論况南陽失仲景之㫖者有之不特宋氏所譏况傷寒為大病生死在五六日間可不盡心乎陽毒隂毒歌陽毒健亂四肢煩面赤生花作㸃班狂言妄語如神鬼下利頻多候不安汗出遍身應大差魚口開張命欲翻有藥不辜但與服能過七日漸須安隂毒傷寒身體重背強眼痛不堪任小腹痛急口青黒毒氣衝心轉不禁四肢厥冷惟思吐咽喉不利脉細沉若能速灸臍輪下六日看過見喜深隂陽二毒病有輕重治有淺深仲景畧言于金匱要畧後世傳述備載諸書亦難以二歌盡診諸雜病生死脉候歌病源各不一今歌本診生死之脉故不論病原只論脉之生死腹脹浮大是出厄虛小命殂須努力此篇大抵以脉病相應不應言生死然亦不可專執臨病參攷可也如中惡腹脹脉緊細者生浮大者死之類下痢㣲小却為生脉大浮洪無差日下痢脉代絶者不死雜色惡痢脉㣲弱暴冷傷陽脉細欲絶冷熱不調者洪大易治㣲遲小細難治恍惚之病定顛發為狂其脉實牢保安吉寸闗尺部沉細時如此未聞人救得恍惚顛狂三病也恍惚心不寧隂顛而陽狂也脉經曰顛病脉虚可治實則死盖重隂為顛謂隂部内見沉濇㣲短脉是陽脉不見而隂獨盛故為顛疾經曰隂氣從下下虚上實故作顛疾則沉細脉是脉病相應而不逆矣消渇脉數大者活虚小病深厄難脫三消之証内消渇一証沉小者生實堅大者死此外如少隂自利而渇脉必沉中暑渇脉虚産後渇脉多弱難専以虚小為渇之凶水氣浮大得延生沉細應當是死别水病之証不一脉亦不一三因方曰沉伏相摶名曰水盖沉者乃水之病脉但風水皮水脉浮石水脉沉黄汗沉遲當參病原病証為㫁况水病肌肉為水所脹脉元多沉若脉出必死脉病相反也今曰浮大延生更冝參審霍亂之候脉㣲遲氣少不語大難醫三部浮疾必救得古今課定更無疑病原曰脉伏及代而亂者霍亂也不亂猶不治㣲細不可治霍亂吐下脉㣲遲氣息劣口不欲言者不可治脉經所無脉訣自創之例也通真子曰清濁相干霍亂時脉如㣲細是相宜不言氣劣㣲遲小此候神工亦莫醫通真子註脉訣不遵之而自作歌一曰浮洪可救一曰㣲細相宜何哉盖病原不同脉随而見以病原參之勿一例但曰霍亂而已也鼻衂吐血沉細宜忽然浮大即傾危吐衂証中有卒中惡吐血脉沉數細者死浮大疾快者生又雜病衂貴裏熱傷寒衂貴表熱表熱者脉必浮咳而尿血羸瘦形其脉疾大命難任唾血之脉沉弱吉忽若實大死来侵金瘡血盛出虚細活急疾大數必危身此六句參錯在後今移于此從失血類脉訣所論金瘡本于脉經中蔵經皆論已出血之脉若金瘡未出血則又别墜壓内傷堅強安小弱凶頓仆内傷同笞榜内有結血實大生虚小死跌撲傷損浮大易安謂血散外沉細緊實多死謂惡血攻藏病人脉健不用治健人脉病號行尸病人脉健此云不用治者是前形脉相反歌何其謬也心腹病脉沉細差浮大弦長命必殂仲景曰假令病人云腹内卒痛浮而大知其差也何以知之若裏有病者脉當浮細今浮大故知愈也病原曰若其人不即愈者必當死以脉病相反也然心痛與腹痛各異凡痛五藏相干而心痛脉各異見惟真心痛不問脉旦占夕死夕占旦死腹痛内原亦不一虚寒緊弦積寒沉緊而實肝腎弦大為寒痛故知弦長亦難以死㫁頭痛短濇應須死浮滑風痰必易除脉訣此言只可㫁風痰頭痛一証而已頭痛具八經又有伏暑積聚痰厥伏痰腎痰産後失血風寒在腦邪熱上攻氣虚氣攻諸証不同随証診脉㫁生死可也中風口噤遲浮吉急實大數三魂孤魚口氣粗難得差面赤如粧不久居中風髪直口吐沫噴藥悶亂起復蘇咽喉曳鋸水雞響摇頭上竄氣長嘘病人頭面青黒暗汗透毛端恰似珠眼小目瞪不須治喘汗如油不可蘇中風口噤至此皆言中風之死候簡易方云風邪中人其状奄忽故六脉多沉伏亦有脉随氣奔指下洪盛者當此之際脉亦難辨但以証參為是中風目閉口開手撒遺尿聲如鼾睡者必難療内實腹脹痛滿盈心下勞強乾嘔頻手足煩熱脉沉細大小便澁死多真素問曰五實死脉盛皮熱腹脹前後不通悶瞀此謂五實自汗得後利則實者活今脉訣増乾嘔去悶瞀又以脉沉細與病反决以為死此條冝參之内經外實内熱吐相連下清注谷轉難安忽然胗得脉洪大莫費神功定不痊協脉下利胃熱嘔吐脉亦洪大不可遽以死㫁内外俱虚身冷寒汗出如珠㣲嘔煩忽然手足脉厥逆體不安寧必死拚素問曰五虚死脉細皮寒泄利前後飲食不入若漿粥入胃泄注止則虚者活今脉訣内外俱虚與内經多異全本脉經上氣浮腫肩息頻浮滑之脉即相成忽然㣲細應難救神功用盡也無生脉經曰上氣面浮腫肩息其脉大不可治加利甚者必死今脉訣以㣲細為難救似與脉經相悖上氣喘急候何寕手足温煖浄滑生反得寒澁脉厥逆必知歸死命須傾通真子改差無因作命須傾貴協韻也中惡腹脹緊細生若得浮大命逡巡脉經曰卒中惡吐血數升脉沉數者死浮大疾快者生卒中惡腹大四肢滿脉大而緩者生緊大而浮者死緊細而㣲亦生然中惡之候脉亦不等鬼疰脉滑或緊長過寸或尺寸有脉闗中絶不至或乍大乍小乍長乍短遁尸三部緊急或沉重不至寸客忤三部皆滑洪大凡脉尺寸緊數形又似釵直吐轉増此患蠱毒急須救速求神藥命難停脉逢數軟命延生依脉經換末句中毒洪大脉應生細㣲之脉必危傾吐血但出不能止命應難返沒痊平他証吐血皆以沉細為生惟中毒吐血以洪大為生大凡要看生死門大衝脉在即為憑若動應神魂魄在止便干休命不停銅人經大衝二穴土也在足大指夲節後二寸或云一寸半動脉陷中凡診大衝脉可決男子病死生足厥隂脉之所注也為俞靈樞曰胃之清氣上注于肺故氣之過手寸口也動而不止其悍氣上衝頭者合陽明并下人迎故隂陽俱動俱静若引繩相傾者病衝脉者十二經之海也與少隂之大絡起于腎下出于氣衝循隂股内亷邪入骨中循脛骨内臁並少隂之經下入内踝之後入足下其别者邪入踝出屬跗上入大指間此脉之常動者也經脉十二而寸口人迎大衝獨動不休故以此三處診百病決生死靈樞作並足少隂之動脉銅人作足厥隂之俞穴皆衝脉之所合並而經過者其實以候衝脉也仲景謂當時之人握手不及足故立趺陽大谿以候胃腎之病李睎范引活人書所列衝陽穴以解大衝失其穴矣仲景以趺陽専診足陽明大谿専診足少隂察色觀病人生死候歌欲愈之病目眥黄仲景曰若脉和其人大煩目重臉内眥黄者此為欲解必當依仲景以脉參之眼胞忽陷定知亡耳目口鼻黒色起入口十死七實難當赤白黒黄色起入目更兼穿口鼻有灾殃耳目口鼻有黒色起入于口者必死病人及健人黒色若白色起入目及鼻口死在二日中脉經同扁鵲曰按明堂察色入門戸為凶不得為吉所謂門户者闕庭肺門戸目肝門戸耳腎門戸口心脾門户若有色氣入者皆死白色見衝眉上肺有病入闕庭夏死黄色見鼻上者脾有病入口者春夏死青色見人中者肝有病入目者秋死黒色見顴上者腎有病入耳者六月死赤色見頥者心有病入口者冬死盖備五藏五色各入夲藏門戸至被尅之時為死期脉訣四句分作二處夲論一理今移相附添赤去起以備五色脉改兼為穿以明色入門戸為殃李晞范及潔古不知扁鵲所論随各藏色入門户定死期為脉訣所述之源故以意誤解面色忽然望之青近之如黒卒難當此二句移在此從氣色類靣赤目白憂息氣待過十日定存亡面青目黄中時死餘候須看兩日強面黄目青衆惡揚榮衛不通立須亡面青目白亦須亡據脉經改添此句内經曰凡面色見黄為有胃氣皆不死面黄目青酒亂頻邪氣在胃衮其身面黒目白命門敗困極八日死来侵此四句并上面赤目白定存亡二句刋誤本無據刋夲添之在此面無精光如土色不能食時四日亡目無精光齒牙黒面白目黒亦灾殃口如魚口不能閉氣出不返命飛揚肩息直視及唇焦面腫蒼黒也難逃妄語錯亂及不語脉經曰病人不能語者不治熱病者可治又有風瘖不語而卒不死者有妊娠胞脉絶不語俟産後自能言尸臭元知壽不髙人中盡滿兼唇青俗夲作背青非三日須知命必傾兩頰庭黒顴赤人病久必死靈樞曰赤色出兩顴大如拇指者病雖小愈必卒死黒色出于庭大如拇指必不病而卒死庭者首面也顴者眼直下髙骨處也靈樞千金翼皆以庭黒顴赤對言今脉訣取顴赤而舍庭黒又兩頰為贅詞今改為庭黒以備經㫖此必死之兆難以病乆為文口張氣直命難停足趺趾腫膝如斗十日須知難保守項筋舒展定知殂掌内無文也不久唇青體冷又遺尿背面飲食四日期手足爪甲皆白青黒許過八日定難醫脉經有爪甲白者不治之文脉訣遺之今改添脊疼腰重反覆難此是骨絶五日看體重尿赤時不止肉絶六日總髙拚體重溺赤未可便以為肉絶内經曰大肉陷下大骨枯槁脫肉破膕難經曰唇反方可為肉絶更宜參審手足爪青呼罵多筋絶九日定難過髪直如麻半日應是死中蔵經曰腸絶髪直汗出不止不得屈伸者六日死髪眉俱衝起者死髪如麻喜怒不調者死髪直者十五日死今脉訣作半日死與本文不協盖有六日十五日之異今改曰應是死脉訣只歌骨肉筋腸四絶除心肝絶在前又有腎絶小便赤澁下血不止耳乾脚浮舌腫六日死足腫九日死脾絶載脾藏歌中肝絶汗出如水恐懼不安伏卧目直面青八日死胃絶齒落面黄七日或十日死今附注于此庶具載不遺肉絶中藏經元無而脉訣自増故礙理尋衣語死讝妄十知麽夀無多脉經曰尋衣縫讝語者不可治隂陽俱絶尋衣撮空妄言者死論五藏察色候歌面腫蒼黒舌卷青四支乏力眼如盲泣出不止是肝絶八日應當日遇庚辛命必傾此云八日從甲數至庚為八日此言則膠柱矣從直改為庚辛面黎肩息直視看又兼掌腫沒文斑狂言亂語心悶熱一日之内到冥間臍趺腫滿面浮黄洩利不覺汚衣裳肌肉粗澁兼唇反一十二日内灾殃口鼻氣出不復回唇反無文黒鼻似煤皮毛焦乾爪枯折途程二日定知灾面黒齒痛目如盲自汗如水腰折頻皮肉濡結却髪無澤四日應當命不存改結為却本難經診婦人有妊歌舊文不倫今移從各類肝為血兮肺為氣血為榮兮氣為衛隂陽配偶不參差兩藏通和皆類例血衰氣旺定無娠血旺氣衰應有體已上論成妊之原尺寸㣲闗滑尺帯數流利往来併雀啄小兒之脉已形見數月懷胎猶未覺上云尺㣲下云尺數可見上尺為誤女脉在闗下尺脉常盛若尺㣲則無隂為病矣脉經云妊娠初時寸㣲小呼吸五至三月而尺數也内經曰手少隂脉動甚者妊子也又云隂摶陽别謂之有子隂謂尺中摶謂摶擊于手尺脉摶擊與寸口殊别則隂氣挺然為妊之兆此即所謂寸㣲尺數也脉指南云脉動入産門者有胎也謂出尺脉外名曰産門又云尺中脉數而旺者胎脉也為血盛也闗滑雀啄脉經並不載素問曰滑為多血少氣故有子此脉訣所自増也流利往来滑脉之形雀啄者脉指南云闗上一動一止者一月二動一止者二月餘倣此推之萬不失一此所謂雀啄雀啄在他病為死形三部沉正等無疑浮沉按無絶尺内不止真胎婦脉經曰三部浮沉正等按之無絶者有妊也今脉訣去浮以疑易絶云沉正等無疑誤甚今改之夫正等者即仲景所謂寸闗尺三處大小浮沉遲數同等也仲景以同等為隂陽平和之脉雖劇當愈叔和以正等又按無絶為有妊之兆真吉徴也内經腹中論曰何以知懷子之且生也岐伯曰身有病而無邪脉也所謂身有病謂經閉也尺脉来而㫁絶者經閉月水不利今病經閉而脉反如常㫁絶者妊娠也滑疾不㪚按微胎三月但疾不散五月母脉經曰脉滑疾重手按之㣲者胎已三月也重手按之不散但疾不滑者五月也今改上句從脉經已上論三月内有胎之兆然未知男女之兆也四月方可以别故此以下乃分男女之診分作兩類乃明左疾為男右為女流利相通速来去兩手闗脉大相應已形亦在前通語脉經曰妊娠四月欲知男女法左尺偏大為男右尺偏大為女左右尺俱大生二子大者如實状左疾為男右疾為女俱疾生二子既分左右脉疾又云流利相通又云兩手闗脉大相應乃是左右尺脉疾大上與闗大相應又流利相通與寸通應但分左右尺以别男女左陽右隂以位定也池氏以左疾為左寸心部屬太陽經以右疾為右寸肺部屬太隂經盖惑于脉賦太隂洪而女孕太陽大而男孕不知脉賦惑于脉訣之差盖脉賦脉訣皆竊叔和之名以行世所述之脉醇疵相半聲律之賦晉代未有而世鮮知其非明于醫者間亦改之一二而未能盡正云左手太陽浮大沉實診為男右手太隂沉細浮大診為女脉經曰得太隂脉為男得太陽脉為女太隂脉沉太陽脉浮又云左手沉實為男右手浮大為女左右手俱沉實猥生二男左右手俱浮大猥生二女李氏雖改脉訣沉細為沉大猶未知太陽脉浮非男脉經作女診也太隂脉沉非女脉經作男診也又以太陽為左手心部太隂為右手肺部是又惑于脉訣脉賦之差徇池氏以舛注舛之非也脉經雖曰大陽脉沉為男太隂脉浮為女亦不明言以何經為太陽太隂當于何部診之不若脉經後條浮大為女沉實為男為明白故依後條改之諸陽為男諸隂女指下分明長記取脉經曰左右尺俱浮為産二男不爾則男作女生左右尺俱沉為産二女不爾則女作男生前云右浮大為女左沉實為男是獨以左右脉各異立言今左右俱浮為二男俱沉為二女是並左右兩尺脉一同以立言其于諸陽男諸隂女未當差也左沉實左疾左偏大與俱浮或以脉或以位皆陽也右浮大右疾右偏大與俱沉或以脉或以位皆隂也此二句總結男女分診定法也已上辨四月之後妊娠男女之診母乘子夫乘妻兮縱氣露妻乘夫兮横氣助子乘母兮逆氣參夫乘妻母乘子兮順氣䕶仲景謂脉有相乘水行乘火金行乘木曰縱謂其氣直恣乘其所勝也火行乘水木行乘金曰横謂其氣横逆反乘所不勝也水行乘金火行乘木曰逆謂子加于母其氣逆也金行乘水木行乘火為順謂由母至子其氣順也李晞范不知此論相乘脉中夫妻母子却作人身形之夫妻母子解之理不能通然脉訣引此以診别男女妊形據脉經别載于前不載在診妊娠之條夲只是取仲景所論相乘之脉脉訣不䏻甄别混引以歌妊娠今姑依仲景解之此四句元在後今移在此與縱横逆順從類其縱順二脉改作仲景元文左手帯縱兩箇兒右手帯横一雙女左手脉逆生三男右手脉順生三女寸闗尺部皆相應一男一女分形証已上十句皆脉訣自撰之辭恐難以診妊娠男女之别也且相乘之脉乃五藏之邪發為病証見之于脉妊娠乃隂陽和平陽施隂化以成形豈有逆于理乘于蔵現于脉用為男女之診又寸闗尺皆應即是左右手前後如一也即脉經所謂三部浮沉正等之脉何以應一男一女乎已上係脉訣差取仲景所論相乗之脉以論妊娠今條其非如前往来三部通流利滑數相參皆替替陽盛隂虚脉得明遍滿胸堂皆逆氣此言惡阻之証之脉小兒足日胎成聚身熱脉亂無所苦汗出不食吐逆時精神結備其中住此亦謂惡阻証也脉亂盖為滑數而躁疾也非謂惡亂無次序者此八句皆謂妊娠疾脉有時子死母身存或即母亡存子命牢緊強弦滑者安沉細而微歸泉路瞑改以協韻沉細而微謂三部俱如此凶兆也此四句論妊婦生死脉証之别妊婦雜病生死歌血下如同月水来漏極胞乾主殺胎亦損妊毋須憂慮争遣神丹救得回通真子曰此只論漏胎候也夫胎之漏或食動胎之物或因熱毒之氣侵損或因入房勞損損輕則漏輕損重則漏重但漏血盡則死然安胎有二法因母病而動胎但治母疾其胎自安若胎有不堅致動母因以病但治胎則母自安妊娠心腹急痛歌心腹急痛面目青冷汗氣絶命必傾血下不止胎衝上四肢冷悶定傷身妊娠倒仆損傷歌堕胎倒仆或舉重致胎死在腹中居已損未出血不止衝心悶痛母魂孤妊婦傷寒歌傷寒頭痛連百節氣急衝心溺如血上生㸃班赤黒時壮熱不止致胎滅嘔吐不止心煩熱腰背俱強腦痛裂六七日来熱腹中小便不通大便結見此証不損胎而妊母亦或致死治法詳見活人書産後傷寒歌産後因得熱病臨脉細四肢煖者生脉大忽然支逆冷須知其死莫留停脉盛身熱得之傷寒産後熱病脉必洪大難便以脉大為死証必遵内經仲景諸書依法汗下若脉不為汗衰而仍大是為隂陽交乃可㫁死汗後脉静乃可㫁生豈可以病在表裏未行治去遽以脉細為生四肢冷煖當參以病証或陽厥隂厥或作汗而厥今脉訣所歌膠柱刻舟之論産難生死歌欲産之婦脉離經沉細而滑也同名夜半覺痛應分誕来日日午定知生脉經曰離經其脉浮設腹痛引腰脊為欲生也但離經者不産也又云其脉離經夜半覺日中則生也經者常也謂離其常處為離經假如妊婦昨日見左沉實為男之脉今日或脉浮是離其尋常之脉而異于平日又且腹痛是知将誕也通真子引難經一呼三至曰離經為解李晞范又引難經一呼一至曰離經以解沉細而滑皆非也難經言損至二脉雖同名離經其脉與理則不同且脉經明言離經其脉浮也不曽引援難經之文今脉訣因其言脉浮又添沉細而滑同名離經盖以前所診男女脉或云浮大為女若只脉浮為離經若平常見浮大為女之脉何以辨離經故又増沉細而滑以見離浮大之常經為沉滑也聖恵方云夜半子時覺腹痛来日午時必定生産謂子午相衝正半日時數也通真子曰夜半痛日午生此言恐未為的又曰腹痛而腰不痛者未産也若腹痛連腰痛甚者即産所以然者腎係于腰胞擊于腎故也診其尺脉轉急如切繩轉珠者即産也生産有難易痛来有緊慢安可定半日當㫁以活法身重體熱寒又頻舌下之脉黒復青及舌上冷子當死腹中須遣母歸冥面赤舌青細尋看母活子死定應難唇口俱青沬又出母子俱死總髙拚面青舌青赤沫出頻母死子活定知真不信若能看應驗尋之賢哲不虚陳脉指南作面青舌赤盖面以候母舌以候子今云子活合以舌赤為是若云舌青則與前面赤舌青母活子死之候相反若胎先下其子得活如未下子母俱亡自身重體熱寒又頻至此並不用脉只以外候參決子母生死盖以臨産脉不可攷但當以察色而知之新産生死歌新産之脉緩滑吉實大弦急死来侵若得沉重小者吉忽若堅牢命不停寸口濇焱疾不調死沉細附骨不絶生審看此候分明記長須念取向心經脉經曰産後寸口脉焱疾不調者死沉㣲附骨不絶者生今脉訣𫐠脉經作歌既用其文不明其理擅改焱為濇其意以為濇滯疾駛並行方可言不調反以焱疾為非是不知脉濇則不疾脉疾則不濇其不調者以焱疾也産後失血多五藏虚故以緩滑沉㣲不絶為脉應病濇為少血亦應病之脉惟焱疾不調匀則脉形之速焱浮于上故云死一字之差生死頓異小兒生死候歌通真子曰經云六嵗以下為小兒十八以下為少年二十以上為壮年五十以上為老年其六嵗以下經所不載是以乳下嬰兒病難治者皆無脉可以考也中古有巫方立小兒顱𩕄經以占夭夀疾病生死相𫝊習有少小方焉迄乎晉宋推諸蘇家又有巢氏作小兒病源候論今脉訣此歌乃萬分之一爾愚謂自宋以来専小方脉者稍多如錢氏朱氏張氏㓜㓜新書全嬰書嬰孩寳鑑活㓜口議馮氏妙選寳秘方及諸家名方必博覧方可况小兒之脉當以大指展轉分按三部且其脉未定當以察形色為上工諸胎中諸變蒸五疳急慢驚風瘡疹與大人殊其他雜病與大人治療則同但藥劑有大小輕重小兒乳後輒嘔逆更兼脉亂無憂慮脉經曰是其日數應變蒸之時身熱脉亂汗不出不欲食食輒吐哯者脉亂無苦也弦急之時被氣纒脉緩沉只是不消乳脉經曰小兒脉沉者食不消脉訣云緩非也緊數細快亦少苦虚濡邪氣驚風助脉緊乃是風癇痼脉經曰緊為風癇本事方同今脉訣作虚濡非利下宣腸急痛時浮大之脉歸泉路此非脉經小兒脉内所述已詳解在下利㣲小却為生下脉經畧舉數脉立証以備其書是一脉自為一証李晞范乃總為吐後脉証何見之不明且小兒吐有數等今脉亂之吐乃歌變蒸之候小兒外証十五候歌眼上赤脉下貫瞳人𩕄門腫起兼及作坑鼻乾黒燥肚大筋青目多直視覩不轉睛指甲黒色忽作鵶聲虚舌出口嚙齒咬人魚口氣急啼不作聲蛔蟲既出必是死形用藥速急十無一生附録辨竒經脉兩手脉浮之俱有陽沉之俱有隂陽隂皆實盛者此為衝督之脉也衝督之脉者十二經之道路也衝督用事則十二經不復朝于寸口其人皆苦恍惚狂癡否者必當猶豫有兩心兩手陽脉浮而細㣲綿綿不可知俱有隂脉亦復細綿綿此為隂蹻陽蹻之脉此家曽有病鬼魅厥死苦恍惚亡人為禍診得陽蹻病拘急隂蹻病緩尺寸俱浮直上直下此為督脉腰脊強痛不得俛仰大人癲疾小兒風癇脉来中央浮直上下痛者督脉也動苦腰背膝寒大人顛小兒癇尺寸脉俱牢一作芤直上直下此為衝脉胸中有寒疝也已上元具浮脉條下脉来中央堅實徑至闗者衝脉也動苦小腹痛上搶心有瘕疝絶孕遺失溺脇支滿煩横寸口邊丸丸者任脉也若腹中有氣如指上搶心不得俛仰拘急脉来緊細實長至闗者任脉也動苦少腹繞臍下引横骨隂中切痛已上元具實脉條下吴先生云五蔵六府之經分布手足九十二脉魚際下寸内九分尺内十分者手太隂肺經之一脉也醫者于寸闗尺輒名之曰此心脉此肺脉此肝脉此腎脉非也兩手三部皆肺藏脉而分其部位以候他藏之氣焉耳其說見于素問脉腰精㣲論而其所以之故則秦越人八十一難之首章發明至矣是何也脉者血之流𣲖氣使然也肺居五藏之上氣所出入門戸也脉行始肺終肝而後復㑹于肺故其經穴名曰氣口而為脉之大㑹一身之害必于是占焉脉訣刋誤卷下
