body:
  text: 脈訣刊誤卷下元戴啓宗撰經曰知者一言而終不知者流散無窮脈之為説前已論辨于各脈之下今又以分合偶比類五字以經綸錯綜之庶無惑矣分有脈之形分謂脈各有形狀當先明辨便了然不疑大小浮沉滑澀可以指别迥然各異辨之于毫釐之間使其形不相混如舉有按無為浮按有舉無為沉之類有脈之證分謂脈之一字獨見為證如寸浮中風頭痛之類不雜他脈獨為證今脈訣歌在各脈之後者是也或獨見一部或通見三部或兩手俱現合有合衆脈之形為一脈者謂如似沉似伏實大長弦之合為牢極軟浮細之合為濡之類有合衆脈之形為一證者謂浮緩為不仁浮滑為飲浮洪大而長為風眩顛疾有二脈合者有三四脈合者大抵脈獨見為證者鮮參合衆脈為證者多今脈訣獨取平三關一脈論證而遺其合衆脈以論證者今各補注于後以全其脈證此條補注節抄不及備録且一脈雖獨見而為證亦不一如浮為風又為虛又為氣各不同此又一脈之證合也必備論之以證相參而考脈則思過半矣潔古張元素醫學啓源云右寸大腸肺脈之所出也先以輕手得之是大腸屬表後以重手得之是肺屬裏肺合皮毛肺脈尋皮毛而行持脈指法如三菽之重按至皮毛而得為浮稍稍加力脈道不利為澀又稍加力脈道縮入關中上半指不動下半指微動為短此乃浮澀而短肺不病三脈也肺脈本部在于皮毛之上見于膚表是其浮也入于皮毛之下見于血脈肌肉之分是其沉也六部倣此此診之定法可以合衆脈之形矣偶脈合隂陽必有偶對經曰善為脈者必以比類竒恆從容知之浮沉者脈之升降也浮升在上沉降在下為諸脈之根本為隂陽之定位為表裏之定診浮法天有輕清在上之象沉法地有重濁在下之象浮為風為虛體髙而氣浮也沉為中堅為內藴體聚而不散也論諸脈者必先此二脈遲數者脈之緊慢也脈以四五至為平減一至為三至曰遲增一至為六至曰數難經曰遲隂為在藏數陽為在府遲則為寒數則為熱亦偶言之也中藏經曰數在上陽中之陽在下隂中之陽遲在上陽中之隂在下隂中之隂數在中則中熱遲在中則中寒寒用熱助熱用寒助本乎隂陽也虛實者脈之剛柔也按之浮中沉皆有力為實遲大而軟按之豁豁然空為虛虛實之由皆以有餘不足占之故以按而知經曰其氣來實強為太過病在外氣來虛微為不及病在內血實脈實血虛脈虛亦皆偶而言之論表裏虛實必以此二脈中藏經曰脈舉之滑按之微看在何部以斷其藏又按之沉小弱微短澀軟濡俱為藏虛其脈舉按皆盛者實也又長浮數疾洪緊弦大俱曰藏實其脈浮而實大者府實也輕手按之滑重手按之平者府虛也左右寸口沉結實大者上實也左右寸弱而微者上虛也左右尺脈伏而澀者下實也尺中脈滑而濡者下虛也尺中微澀短小者俱屬下虛也許叔微曰浮緩為表虛傷風解肌浮緊澀有力為表實傷寒發汗脈沉無力為裏虛可溫沉而有力緊實為裏實可下此論傷寒表裏虛實凡此皆非單論脈虛實之理長短者脈之盈縮也脈盈過于本位曰長脈縮不及本位回短長有見于尺寸有通見于三部短只見于尺寸蓋必質于中而後知過于中為長不及于中為短經曰長則氣治短則氣病脈有三隂三陽而長短在其中是亦偶而言之又曰人長脈長人短脈短又因人形體而别滑澀者脈之通滯也脈通則流利無礙曰滑脈滯則蹇澀不流曰澀內經曰滑者隂氣有餘澀者陽氣有餘難經三隂三陽滑澀對舉千金曰滑者多血少氣澀者多氣少血皆偶言也以二義考之隂氣有餘者血多也血多則氣少脈者血之府也榮行脈中今血多故流利圎滑陽氣有餘者氣多也氣多則血少故艱澀而散一止復來先明氣血之多少斯知滑澀之理洪微者脈之盛衰也血熱而盛氣隨以溢滿指洪大衝湧有餘洪為脈之盛也氣虛而寒血隨而澀應指微細欲絶微為脈之衰也緊緩者脈之急慢也緊為傷寒寒則傷榮榮受寒邪脈絡激摶若風起水湧既如切繩又如轉索緩為風結皮膚不仁榮血不流衛氣獨行不能疾速血虛頑痺脈為緩慢榮受寒邪則脈緊榮血蹇澀則脈緩二脈由榮而見沈氏曰緊為隂隂主寒寒則物斂而有拘攣之象又主痛諸痛皆原于寒又主宿食由胃虛挾寒不能腐化故也緩為陽熱主血虛血虛則脈體弱又主氣虛氣虛則脈體無力又主風風者陽邪主舒啓縱弛故也動伏者脈之出處也出見于外故數見關上如豆大出類而異于三部者動也虛藏于內不見其形脈行筋下者伏也二者猶人物之出處也結促者因止以别隂陽之盛也陽盛則促脈疾而時止隂盛則結脈徐而時止雖有止非死脈也代則死脈也促結為偶而代無對脈不可以偶對言者不敢鑿也三因方盡為偶名而以弦弱芤微濡革散代亦為偶非一隂一陽也因知其不可盡以偶言也必一隂一陽而後可偶然又有脈偶而同見者如大小緩急疾徐疏數之類經曰前大後小前小後大來疾去徐來徐去疾去不盛來反盛去盛來不盛乍大乍小乍短乍長乍踈乍數是二脈偶見也亦有兩手偶見者如左大右小左小右大之類比比者所以明相類之脈比其類而合之因其疑也辨其異而分之決其疑也內經曰脾虛浮似肺腎小浮似脾肝急沉似腎此皆三者之所亂也然從容得之以知其比類也注云以三藏相近故脈象參差而相類是以三惑亂為治之過失矣必從容比類而得三藏之形狀故浮緩曰脾浮短曰肺浮而滑曰心急緊而散曰肝摶沉而滑曰腎不能比類則疑惑彌甚是以脈經立相類之脈今立比字為綱使從容比類先明于未診之先免交疑于持脈之際脈經曰浮與芤相類一曰與洪相類弦與緊相類滑與數沉與伏微與澀軟與弱緩與遲革與實千金云牢與實今細詳之有弦細有芤虛有濡芤有洪散有牢伏有數脈同類者洪散俱大也而散無力濡弱同極軟而細也有浮沉之異微細俱小也而微無力芤類浮也按之邊有中無濡類芤也按之如無沉伏牢同居下也按有餘曰沉按實大長弦曰牢按不見脈行筋下曰伏弦細同直長之形同收斂之義也亦有大小之分弦如弦之直細如線之細遲緩同慢也有三至四至之異大慢小衰之别澀微易識也何疑乎相類牢與實革與實非相類也脈賦云洪與實形同倣佛是相類也洪實同有力而大也洪分沉浮之異實合浮沉而皆有力弦與緊之異弦左右無而中直如弦緊左右彈而有如轉索雖相類而甚相逺也又有數脈之相類如澀促結代同一止也而全不同他如濡弱遲如芤虛如微細濡弱澀已辨于各脈條下類易曰方以類聚又曰本乎天者親上本乎地者親下則各從其類也內經曰脈合隂陽又曰察之有紀從隂陽始衆脈隂陽各以類從知乎此則七表八裏九道之非不膠固于先入之言矣旨哉蔡西山之論也曰凡中脈不大不細不長不短不浮不沉不滑不澀應手中和意思欣欣難以名狀者為胃氣其太過為大為長為實為堅為強為浮為芤為滑為洪為急為促者皆陽也其不及為細為短為虛為軟為沉為結為伏為澀為微者皆隂也陽摶隂為弦隂摶陽為緊隂陽相摶為動寒虛相摶為革隂陽分離為散隂陽不續為代難經曰諸陽為熱諸隂為寒數則為熱遲則為寒浮為表沉為裏三因方云博則二十四字不濫絲毫約則浮沉遲數總括綱紀故知浮為風為虛沉為濕為實遲為寒為冷數為熱為燥風濕寒熱屬外虛實冷燥屬內內外既分三因頓别三點劉立之亦以浮沉遲數四字為綱以教學者浮風沉氣遲冷數熱分别三部為證此誠初學入門然必博學反約然後能知脈之妙若遽以此自足則今汝畫矣故述此于分合比偶類五字之後診雜病生死候歌五十不止身無病數內有止皆知定四十一止一藏絶却後四年多沒命三十一止即三年二十一止二年應十五一止一年殂以下有止看暴病柳氏曰以動數候脈是喫緊語候脈須候五十動知五藏之氣有無缺失今人手指到病人腕臂便以為見了殊不知五十動見豈彈指間事相習成風以疾速為神竒廬山劉立之號曰三點以手中指點人三部脈生死吉凶多驗學徒相傳亦用之劉果三點之神耶抑亦聲色得之耶色可傳脈不可傳古人以切脈為上工如扁鵲飲上池水能洞見人藏府間病如華陀刳骨剔胃是豈切脈而得之歟後世聖神之術不常有所當學者診脈以知內參以問證察言觀色以知外則可耳脈經曰脈來五十投而不止者五藏皆受氣即無病四十投而一止者一藏無氣却後四嵗死以至十投一止者四藏無氣嵗中死其言幾藏無氣以分别幾嵗之死期豫竊疑之內經曰腎絶六日死肝絶八日死心絶一日死果此藏氣絶又安能待四嵗三嵗乎大抵五十動者脈之大數要必候五十動不可不及五十動而遽不候也或問候止脈何處數起曰得止脈後再從始至脈數起看得幾至而止為數診暴病歌兩動一止或三四三動一至六七死四動一止即八朝以此推排但依次此是十動內有止脈者然難必謂暴病有此久病亦有見此者但當以至數定死期不必專于診暴病也形脈相反歌健人脈病號行尸病人脈健亦如之審言之短長肥瘦並如此細心診候有依稀脈病相違亦若斯內經曰形氣有餘脈氣不足死脈氣有餘形氣不足生仲景曰脈病人不病名曰行尸以無王氣卒眩仆不識人則死人病脈不病名曰內虛以無穀神雖困無苦今脈訣曰亦如之是與行尸同也故改之仲景曰肥人貴浮瘦人貴沉肥人當沉今反浮故貴之瘦人當浮今反沉故貴之脈經曰當視其人大小長短皆如其人之形性則吉反之則為逆肥人脈細小如絲身澀而脈來往滑身滑而脈來往澀皆死前言形脈相反又有脈病相反不可不備舉難經所謂脈不應病病不應脈者是也素問曰形盛脈細少氣不足以息者死形瘦脈大胸中多氣者死形氣相得者生三五不調者病形肉已脫九候雖調猶死病熱脈靜泄而脈大脫血而脈實病在中脈實堅病在外脈不實堅者皆難治難經曰病若閉目不欲見人脈當得肝脈弦急而長而反得肺脈浮澀而短者死病若閉目而渴心下牢者脈當得緊實而數反得沉濡而微者死此類皆脈病相反脈訣所缺今改此歌末句以著之診四時病五行相克歌春得秋脈定知死死在庚辛申酉裏夏得冬脈亦如然還于壬癸為期爾嚴冬診得四季脈戊己辰戌還是厄秋得夏脈亦同前為緣丙丁相刑尅季月季夏得春脈克在甲寅應病極直逢乙卯亦非良此是五行相鬼賊內經難經並以天干五行論克賊脈訣又以地支並論若用支干上下純為鬼邪之日為死必六十日方遇若死期之近何以克之不若以天干一旬為期依內經為斷不失之拘也內經又曰夫邪氣之客于身也以勝相加至其所生而愈謂我所生者至其所不勝而甚至其所生而持謂生我者自得其位而起必定五藏之脈乃可言間甚之期訣四時虛實五邪歌一藏有五邪今只取虛實微三邪作歌及立名又只取二邪而遺其一今改作診五邪歌春得冬脈只是虛兼令補腎病自除若是夏脈緣心實還應瀉子自無虞夏秋冬月皆如是所勝為微不勝賊在前為實後為虛春中若得四季脈不治多應病自除今添兩句云正邪自病通成五四時五藏倣斯圗難經曰虛則補其母實則瀉其子虛當補母人所共知千金曰心勞甚者補脾氣以益之脾旺則感于心矣若乃勞則補其子人所未聞蓋母生我者也子繼我而助我者也方治其虛則補其生我者與郭氏葬書本骸得氣遺體受蔭同義方治其勞則補其助我者與荀子所謂未有子富而父貧同義此補虛與治勞之異也傷寒歌傷寒熱病同看脈滿手透關洪拍拍出至風門遇太陽一日之中見脫厄過關微有慢騰騰直至伏時重候覔掌內迢迢散漫行瘥軋𩖊疔多不的大凡當日問途程遲數洪微更消息熱病須得脈浮洪細小徒費用神功汗後脈靜當便差喘熱脈亂命應終此歌未足以括傷寒之綱要也三百九十七法一百一十三方學者以仲景傷寒論為祖成無已注及明理論許叔微百證百問薛宋二氏鈴則又發明仲景之旨奧外此則蘭臺寶鑑金匱要略無求子百問南陽百問龎安常王仲弓盧昶韓祗和孫用和及諸家之書遍覽參考守之以正條用之以活法方為盡善此歌其能盡乎豫又病世之醫者往往以活人言自足不復祖之仲景之論况南陽失仲景之旨者有之不特宋氏所譏况傷寒為大病生死在五六日間可不盡心乎陽毒隂毒歌陽毒健亂四肢煩面赤生花作點班狂言妄語如神鬼下利頻多候不安汗出遍身應大差魚口開張命欲翻有藥不辜但與服能過七日漸須安隂毒傷寒身體重背強眼痛不堪任小腹痛急口青黑毒氣衝心轉不禁四肢厥冷惟思吐咽喉不利脈細沉若能速灸臍輪下六日看過見喜深隂陽二毒病有輕重治有淺深仲景略言于金匱要略後世傳述備載諸書亦難以二歌盡診諸雜病生死脈候歌病源各不一今歌本診生死之脈故不論病原只論脈之生死腹脹浮大是出厄虛小命殂須努力此篇大抵以脈病相應不應言生死然亦不可專執臨病參考可也如中惡腹脹脈緊細者生浮大者死之類下痢微小却為生脈大浮洪無差日下痢脈代絶者不死雜色惡痢脈微弱暴冷傷陽脈細欲絶冷熱不調者洪大易治微遲小細難治恍惚之病定顛發為狂其脈實牢保安吉寸關尺部沉細時如此未聞人救得恍惚顛狂三病也恍惚心不寧隂顛而陽狂也脈經曰顛病脈虛可治實則死蓋重隂為顛謂隂部內見沉澀微短脈是陽脈不見而隂獨盛故為顛疾經曰隂氣從下下虛上實故作顛疾則沉細脈是脈病相應而不逆矣消渴脈數大者活虛小病深厄難脫三消之證內消渴一證沉小者生實堅大者死此外如少隂自利而渴脈必沉中暑渴脈虛産後渴脈多弱難専以虛小為渴之凶水氣浮大得延生沉細應當是死别水病之證不一脈亦不一三因方曰沉伏相摶名曰水蓋沉者乃水之病脈但風水皮水脈浮石水脈沉黃汗沉遲當參病原病證為斷况水病肌肉為水所脹脈元多沉若脈出必死脈病相反也今曰浮大延生更冝參審霍亂之候脈微遲氣少不語大難醫三部浮疾必救得古今課定更無疑病原曰脈伏及代而亂者霍亂也不亂猶不治微細不可治霍亂吐下脈微遲氣息劣口不欲言者不可治脈經所無脈訣自創之例也通真子曰清濁相干霍亂時脈如微細是相宜不言氣劣微遲小此候神工亦莫醫通真子注脈訣不遵之而自作歌一曰浮洪可救一曰微細相宜何哉蓋病原不同脈隨而見以病原參之勿一例但曰霍亂而已也鼻衄吐血沉細宜忽然浮大即傾危吐衄證中有卒中惡吐血脈沉數細者死浮大疾快者生又雜病衄貴裏熱傷寒衄貴表熱表熱者脈必浮咳而尿血羸瘦形其脈疾大命難任唾血之脈沉弱吉忽若實大死來侵金瘡血盛出虛細活急疾大數必危身此六句參錯在後今移于此從失血類脈訣所論金瘡本于脈經中藏經皆論已出血之脈若金瘡未出血則又别墜壓內傷堅強安小弱凶頓仆內傷同笞榜內有結血實大生虛小死跌撲傷損浮大易安謂血散外沉細緊實多死謂惡血攻藏病人脈健不用治健人脈病號行尸病人脈健此云不用治者是前形脈相反歌何其謬也心腹病脈沉細差浮大弦長命必殂仲景曰假令病人云腹內卒痛浮而大知其差也何以知之若裏有病者脈當浮細今浮大故知愈也病原曰若其人不即愈者必當死以脈病相反也然心痛與腹痛各異凡痛五藏相干而心痛脈各異見惟真心痛不問脈旦占夕死夕占旦死腹痛內原亦不一虛寒緊弦積寒沉緊而實肝腎弦大為寒痛故知弦長亦難以死斷頭痛短澀應須死浮滑風痰必易除脈訣此言只可斷風痰頭痛一證而已頭痛具八經又有伏暑積聚痰厥伏痰腎痰産後失血風寒在腦邪熱上攻氣虛氣攻諸證不同隨證診脈斷生死可也中風口噤遲浮吉急實大數三魂孤魚口氣粗難得差面赤如粧不久居中風髮直口吐沫噴藥悶亂起復蘇咽喉曳鋸水雞響搖頭上竄氣長噓病人頭面青黑暗汗透毛端恰似珠眼小目瞪不須治喘汗如油不可蘇中風口噤至此皆言中風之死候簡易方云風邪中人其狀奄忽故六脈多沉伏亦有脈隨氣奔指下洪盛者當此之際脈亦難辨但以證參為是中風目閉口開手撒遺尿聲如鼾睡者必難療內實腹脹痛滿盈心下勞強乾嘔頻手足煩熱脈沉細大小便澀死多真素問曰五實死脈盛皮熱腹脹前後不通悶瞀此謂五實自汗得後利則實者活今脈訣增乾嘔去悶瞀又以脈沉細與病反決以為死此條冝參之內經外實內熱吐相連下清注谷轉難安忽然疹得脈洪大莫費神功定不痊協脈下利胃熱嘔吐脈亦洪大不可遽以死斷內外俱虛身冷寒汗出如珠微嘔煩忽然手足脈厥逆體不安寧必死拚素問曰五虛死脈細皮寒泄利前後飲食不入若漿粥入胃泄注止則虛者活今脈訣內外俱虛與內經多異全本脈經上氣浮腫肩息頻浮滑之脈即相成忽然微細應難救神功用盡也無生脈經曰上氣面浮腫肩息其脈大不可治加利甚者必死今脈訣以微細為難救似與脈經相悖上氣喘急候何寧手足溫暖淨滑生反得寒澀脈厥逆必知歸死命須傾通真子改差無因作命須傾貴協韻也中惡腹脹緊細生若得浮大命逡巡脈經曰卒中惡吐血數升脈沉數者死浮大疾快者生卒中惡腹大四肢滿脈大而緩者生緊大而浮者死緊細而微亦生然中惡之候脈亦不等鬼疰脈滑或緊長過寸或尺寸有脈關中絶不至或乍大乍小乍長乍短遁尸三部緊急或沉重不至寸客忤三部皆滑洪大凡脈尺寸緊數形又似叉直吐轉增此患蠱毒急須救速求神藥命難停脈逢數軟命延生依脈經換末句中毒洪大脈應生細微之脈必危傾吐血但出不能止命應難返沒痊平他證吐血皆以沉細為生惟中毒吐血以洪大為生大凡要看生死門大衝脈在即為憑若動應神魂魄在止便干休命不停銅人經大衝二穴土也在足大指夲節後二寸或云一寸半動脈陷中凡診大衝脈可決男子病死生足厥隂脈之所注也為俞靈樞曰胃之清氣上注于肺故氣之過手寸口也動而不止其悍氣上衝頭者合陽明并下人迎故隂陽俱動俱靜若引繩相傾者病衝脈者十二經之海也與少隂之大絡起于腎下出于氣衝循隂股內亷邪入骨中循脛骨內臁並少隂之經下入內踝之後入足下其别者邪入踝出屬跗上入大指間此脈之常動者也經脈十二而寸口人迎大衝獨動不休故以此三處診百病決生死靈樞作並足少隂之動脈銅人作足厥隂之俞穴皆衝脈之所合並而經過者其實以候衝脈也仲景謂當時之人握手不及足故立趺陽大溪以候胃腎之病李睎范引活人書所列衝陽穴以解大衝失其穴矣仲景以趺陽専診足陽明大溪専診足少隂察色觀病人生死候歌欲愈之病目眥黃仲景曰若脈和其人大煩目重臉內眥黃者此為欲解必當依仲景以脈參之眼胞忽陷定知亡耳目口鼻黑色起入口十死七實難當赤白黑黃色起入目更兼穿口鼻有災殃耳目口鼻有黑色起入于口者必死病人及健人黑色若白色起入目及鼻口死在二日中脈經同扁鵲曰按明堂察色入門戶為凶不得為吉所謂門户者闕庭肺門戶目肝門戶耳腎門戶口心脾門户若有色氣入者皆死白色見衝眉上肺有病入闕庭夏死黃色見鼻上者脾有病入口者春夏死青色見人中者肝有病入目者秋死黑色見顴上者腎有病入耳者六月死赤色見頥者心有病入口者冬死蓋備五藏五色各入夲藏門戶至被尅之時為死期脈訣四句分作二處夲論一理今移相附添赤去起以備五色脈改兼為穿以明色入門戶為殃李晞范及潔古不知扁鵲所論隨各藏色入門户定死期為脈訣所述之源故以意誤解面色忽然望之青近之如黑卒難當此二句移在此從氣色類靣赤目白憂息氣待過十日定存亡面青目黃中時死餘候須看兩日強面黃目青衆惡揚榮衛不通立須亡面青目白亦須亡據脈經改添此句內經曰凡面色見黃為有胃氣皆不死面黃目青酒亂頻邪氣在胃衮其身面黑目白命門敗困極八日死來侵此四句并上面赤目白定存亡二句刋誤本無據刋夲添之在此面無精光如土色不能食時四日亡目無精光齒牙黑面白目黑亦災殃口如魚口不能閉氣出不返命飛揚肩息直視及唇焦面腫蒼黑也難逃妄語錯亂及不語脈經曰病人不能語者不治熱病者可治又有風瘖不語而卒不死者有妊娠胞脈絶不語俟産後自能言尸臭元知壽不髙人中盡滿兼唇青俗夲作背青非三日須知命必傾兩頰庭黑顴赤人病久必死靈樞曰赤色出兩顴大如拇指者病雖小愈必卒死黑色出于庭大如拇指必不病而卒死庭者首面也顴者眼直下髙骨處也靈樞千金翼皆以庭黑顴赤對言今脈訣取顴赤而舍庭黑又兩頰為贅詞今改為庭黑以備經旨此必死之兆難以病久為文口張氣直命難停足趺趾腫膝如斗十日須知難保守項筋舒展定知殂掌內無文也不久唇青體冷又遺尿背面飲食四日期手足爪甲皆白青黑許過八日定難醫脈經有爪甲白者不治之文脈訣遺之今改添脊疼腰重反覆難此是骨絶五日看體重尿赤時不止肉絶六日總髙拚體重溺赤未可便以為肉絶內經曰大肉陷下大骨枯稿脫肉破膕難經曰唇反方可為肉絶更宜參審手足爪青呼罵多筋絶九日定難過髮直如麻半日應是死中藏經曰腸絶髮直汗出不止不得屈伸者六日死髮眉俱衝起者死髮如麻喜怒不調者死髮直者十五日死今脈訣作半日死與本文不協蓋有六日十五日之異今改曰應是死脈訣只歌骨肉筋腸四絶除心肝絶在前又有腎絶小便赤澀下血不止耳乾腳浮舌腫六日死足腫九日死脾絶載脾藏歌中肝絶汗出如水恐懼不安伏卧目直面青八日死胃絶齒落面黃七日或十日死今附注于此庶具載不遺肉絶中藏經元無而脈訣自增故礙理尋衣語死讝妄十知麼夀無多脈經曰尋衣縫讝語者不可治隂陽俱絶尋衣撮空妄言者死論五藏察色候歌面腫蒼黑舌卷青四支乏力眼如盲泣出不止是肝絶八日應當日遇庚辛命必傾此云八日從甲數至庚為八日此言則膠柱矣從直改為庚辛面黎肩息直視看又兼掌腫沒文斑狂言亂語心悶熱一日之內到冥間臍趺腫滿面浮黃泄利不覺汚衣裳肌肉粗澀兼唇反一十二日內災殃口鼻氣出不復回唇反無文黑鼻似煤皮毛焦乾爪枯折途程二日定知災面黑齒痛目如盲自汗如水腰折頻皮肉濡結却髮無澤四日應當命不存改結為却本難經診婦人有妊歌舊文不倫今移從各類肝為血兮肺為氣血為榮兮氣為衛隂陽配偶不參差兩藏通和皆類例血衰氣旺定無娠血旺氣衰應有體已上論成妊之原尺寸微關滑尺帶數流利往來併雀啄小兒之脈已形見數月懷胎猶未覺上云尺微下云尺數可見上尺為誤女脈在關下尺脈常盛若尺微則無隂為病矣脈經云妊娠初時寸微小呼吸五至三月而尺數也內經曰手少隂脈動甚者妊子也又云隂摶陽别謂之有子隂謂尺中摶謂摶擊于手尺脈摶擊與寸口殊别則隂氣挺然為妊之兆此即所謂寸微尺數也脈指南云脈動入産門者有胎也謂出尺脈外名曰産門又云尺中脈數而旺者胎脈也為血盛也關滑雀啄脈經並不載素問曰滑為多血少氣故有子此脈訣所自增也流利往來滑脈之形雀啄者脈指南云關上一動一止者一月二動一止者二月餘倣此推之萬不失一此所謂雀啄雀啄在他病為死形三部沉正等無疑浮沉按無絶尺內不止真胎婦脈經曰三部浮沉正等按之無絶者有妊也今脈訣去浮以疑易絶云沉正等無疑誤甚今改之夫正等者即仲景所謂寸關尺三處大小浮沉遲數同等也仲景以同等為隂陽平和之脈雖劇當愈叔和以正等又按無絶為有妊之兆真吉徴也內經腹中論曰何以知懷子之且生也岐伯曰身有病而無邪脈也所謂身有病謂經閉也尺脈來而斷絶者經閉月水不利今病經閉而脈反如常斷絶者妊娠也滑疾不散按微胎三月但疾不散五月母脈經曰脈滑疾重手按之微者胎已三月也重手按之不散但疾不滑者五月也今改上句從脈經已上論三月內有胎之兆然未知男女之兆也四月方可以别故此以下乃分男女之診分作兩類乃明左疾為男右為女流利相通速來去兩手關脈大相應已形亦在前通語脈經曰妊娠四月欲知男女法左尺偏大為男右尺偏大為女左右尺俱大生二子大者如實狀左疾為男右疾為女俱疾生二子既分左右脈疾又云流利相通又云兩手關脈大相應乃是左右尺脈疾大上與關大相應又流利相通與寸通應但分左右尺以别男女左陽右隂以位定也池氏以左疾為左寸心部屬太陽經以右疾為右寸肺部屬太隂經蓋惑于脈賦太隂洪而女孕太陽大而男孕不知脈賦惑于脈訣之差蓋脈賦脈訣皆竊叔和之名以行世所述之脈醇疵相半聲律之賦晉代未有而世鮮知其非明于醫者間亦改之一二而未能盡正云左手太陽浮大沉實診為男右手太隂沉細浮大診為女脈經曰得太隂脈為男得太陽脈為女太隂脈沉太陽脈浮又云左手沉實為男右手浮大為女左右手俱沉實猥生二男左右手俱浮大猥生二女李氏雖改脈訣沉細為沉大猶未知太陽脈浮非男脈經作女診也太隂脈沉非女脈經作男診也又以太陽為左手心部太隂為右手肺部是又惑于脈訣脈賦之差徇池氏以舛注舛之非也脈經雖曰大陽脈沉為男太隂脈浮為女亦不明言以何經為太陽太隂當于何部診之不若脈經後條浮大為女沉實為男為明白故依後條改之諸陽為男諸隂女指下分明長記取脈經曰左右尺俱浮為産二男不爾則男作女生左右尺俱沉為産二女不爾則女作男生前云右浮大為女左沉實為男是獨以左右脈各異立言今左右俱浮為二男俱沉為二女是並左右兩尺脈一同以立言其于諸陽男諸隂女未當差也左沉實左疾左偏大與俱浮或以脈或以位皆陽也右浮大右疾右偏大與俱沉或以脈或以位皆隂也此二句總結男女分診定法也已上辨四月之後妊娠男女之診母乘子夫乘妻兮縱氣露妻乘夫兮橫氣助子乘母兮逆氣參夫乘妻母乘子兮順氣護仲景謂脈有相乘水行乘火金行乘木曰縱謂其氣直恣乘其所勝也火行乘水木行乘金曰橫謂其氣橫逆反乘所不勝也水行乘金火行乘木曰逆謂子加于母其氣逆也金行乘水木行乘火為順謂由母至子其氣順也李晞范不知此論相乘脈中夫妻母子却作人身形之夫妻母子解之理不能通然脈訣引此以診别男女妊形據脈經别載于前不載在診妊娠之條夲只是取仲景所論相乘之脈脈訣不能甄别混引以歌妊娠今姑依仲景解之此四句元在後今移在此與縱橫逆順從類其縱順二脈改作仲景元文左手帶縱兩箇兒右手帶橫一雙女左手脈逆生三男右手脈順生三女寸關尺部皆相應一男一女分形證已上十句皆脈訣自撰之辭恐難以診妊娠男女之别也且相乘之脈乃五藏之邪發為病證見之于脈妊娠乃隂陽和平陽施隂化以成形豈有逆于理乘于藏現于脈用為男女之診又寸關尺皆應即是左右手前後如一也即脈經所謂三部浮沉正等之脈何以應一男一女乎已上係脈訣差取仲景所論相乘之脈以論妊娠今條其非如前往來三部通流利滑數相參皆替替陽盛隂虛脈得明遍滿胸堂皆逆氣此言惡阻之證之脈小兒足日胎成聚身熱脈亂無所苦汗出不食吐逆時精神結備其中住此亦謂惡阻證也脈亂蓋為滑數而躁疾也非謂惡亂無次序者此八句皆謂妊娠疾脈有時子死母身存或即母亡存子命牢緊強弦滑者安沉細而微歸泉路瞑改以協韻沉細而微謂三部俱如此凶兆也此四句論妊婦生死脈證之别妊婦雜病生死歌血下如同月水來漏極胞乾主殺胎亦損妊毋須憂慮爭遣神丹救得回通真子曰此只論漏胎候也夫胎之漏或食動胎之物或因熱毒之氣侵損或因入房勞損損輕則漏輕損重則漏重但漏血盡則死然安胎有二法因母病而動胎但治母疾其胎自安若胎有不堅致動母因以病但治胎則母自安妊娠心腹急痛歌心腹急痛面目青冷汗氣絶命必傾血下不止胎衝上四肢冷悶定傷身妊娠倒仆損傷歌墮胎倒仆或舉重致胎死在腹中居已損未出血不止衝心悶痛母魂孤妊婦傷寒歌傷寒頭痛連百節氣急衝心溺如血上生點班赤黑時壯熱不止致胎滅嘔吐不止心煩熱腰背俱強腦痛裂六七日來熱腹中小便不通大便結見此證不損胎而妊母亦或致死治法詳見活人書産後傷寒歌産後因得熱病臨脈細四肢暖者生脈大忽然支逆冷須知其死莫留停脈盛身熱得之傷寒産後熱病脈必洪大難便以脈大為死證必遵內經仲景諸書依法汗下若脈不為汗衰而仍大是為隂陽交乃可斷死汗後脈靜乃可斷生豈可以病在表裏未行治去遽以脈細為生四肢冷暖當參以病證或陽厥隂厥或作汗而厥今脈訣所歌膠柱刻舟之論産難生死歌欲産之婦脈離經沉細而滑也同名夜半覺痛應分誕來日日午定知生脈經曰離經其脈浮設腹痛引腰脊為欲生也但離經者不産也又云其脈離經夜半覺日中則生也經者常也謂離其常處為離經假如妊婦昨日見左沉實為男之脈今日或脈浮是離其尋常之脈而異于平日又且腹痛是知將誕也通真子引難經一呼三至曰離經為解李晞范又引難經一呼一至曰離經以解沉細而滑皆非也難經言損至二脈雖同名離經其脈與理則不同且脈經明言離經其脈浮也不曽引援難經之文今脈訣因其言脈浮又添沉細而滑同名離經蓋以前所診男女脈或云浮大為女若只脈浮為離經若平常見浮大為女之脈何以辨離經故又增沉細而滑以見離浮大之常經為沉滑也聖惠方云夜半子時覺腹痛來日午時必定生産謂子午相衝正半日時數也通真子曰夜半痛日午生此言恐未為的又曰腹痛而腰不痛者未産也若腹痛連腰痛甚者即産所以然者腎係于腰胞擊于腎故也診其尺脈轉急如切繩轉珠者即産也生産有難易痛來有緊慢安可定半日當斷以活法身重體熱寒又頻舌下之脈黑復青及舌上冷子當死腹中須遣母歸冥面赤舌青細尋看母活子死定應難唇口俱青沫又出母子俱死總髙拚面青舌青赤沫出頻母死子活定知真不信若能看應驗尋之賢哲不虛陳脈指南作面青舌赤蓋面以候母舌以候子今云子活合以舌赤為是若云舌青則與前面赤舌青母活子死之候相反若胎先下其子得活如未下子母俱亡自身重體熱寒又頻至此並不用脈只以外候參決子母生死蓋以臨産脈不可考但當以察色而知之新産生死歌新産之脈緩滑吉實大弦急死來侵若得沉重小者吉忽若堅牢命不停寸口澀焱疾不調死沉細附骨不絶生審看此候分明記長須念取向心經脈經曰産後寸口脈焱疾不調者死沉微附骨不絶者生今脈訣𫐠脈經作歌既用其文不明其理擅改焱為澀其意以為澀滯疾駛並行方可言不調反以焱疾為非是不知脈澀則不疾脈疾則不澀其不調者以焱疾也産後失血多五藏虛故以緩滑沉微不絶為脈應病澀為少血亦應病之脈惟焱疾不調勻則脈形之速焱浮于上故云死一字之差生死頓異小兒生死候歌通真子曰經云六嵗以下為小兒十八以下為少年二十以上為壯年五十以上為老年其六嵗以下經所不載是以乳下嬰兒病難治者皆無脈可以考也中古有巫方立小兒顱𩕄經以占夭夀疾病生死相傳習有少小方焉迄乎晉宋推諸蘇家又有巢氏作小兒病源候論今脈訣此歌乃萬分之一爾愚謂自宋以來専小方脈者稍多如錢氏朱氏張氏幼幼新書全嬰書嬰孩寶鑑活幼口議馮氏妙選寶祕方及諸家名方必博覽方可况小兒之脈當以大指展轉分按三部且其脈未定當以察形色為上工諸胎中諸變蒸五疳急慢驚風瘡疹與大人殊其他雜病與大人治療則同但藥劑有大小輕重小兒乳後輒嘔逆更兼脈亂無憂慮脈經曰是其日數應變蒸之時身熱脈亂汗不出不欲食食輒吐哯者脈亂無苦也弦急之時被氣纒脈緩沉只是不消乳脈經曰小兒脈沉者食不消脈訣云緩非也緊數細快亦少苦虛濡邪氣驚風助脈緊乃是風癇痼脈經曰緊為風癇本事方同今脈訣作虛濡非利下宣腸急痛時浮大之脈歸泉路此非脈經小兒脈內所述已詳解在下利微小却為生下脈經略舉數脈立證以備其書是一脈自為一證李晞范乃總為吐後脈證何見之不明且小兒吐有數等今脈亂之吐乃歌變蒸之候小兒外證十五候歌眼上赤脈下貫瞳人𩕄門腫起兼及作坑鼻乾黑燥肚大筋青目多直視覩不轉睛指甲黑色忽作鴉聲虛舌出口嚙齒咬人魚口氣急啼不作聲蛔蟲既出必是死形用藥速急十無一生附録辨竒經脈兩手脈浮之俱有陽沉之俱有隂陽隂皆實盛者此為衝督之脈也衝督之脈者十二經之道路也衝督用事則十二經不復朝于寸口其人皆苦恍惚狂癡否者必當猶豫有兩心兩手陽脈浮而細微綿綿不可知俱有隂脈亦復細綿綿此為隂蹻陽蹻之脈此家曽有病鬼魅厥死苦恍惚亡人為禍診得陽蹻病拘急隂蹻病緩尺寸俱浮直上直下此為督脈腰脊強痛不得俯仰大人癲疾小兒風癇脈來中央浮直上下痛者督脈也動苦腰背膝寒大人顛小兒癇尺寸脈俱牢一作芤直上直下此為衝脈胸中有寒疝也已上元具浮脈條下脈來中央堅實徑至關者衝脈也動苦小腹痛上搶心有瘕疝絶孕遺失溺脅支滿煩橫寸口邊丸丸者任脈也若腹中有氣如指上搶心不得俯仰拘急脈來緊細實長至關者任脈也動苦少腹繞臍下引橫骨隂中切痛已上元具實脈條下吳先生云五藏六府之經分布手足九十二脈魚際下寸內九分尺內十分者手太隂肺經之一脈也醫者于寸關尺輒名之曰此心脈此肺脈此肝脈此腎脈非也兩手三部皆肺藏脈而分其部位以候他藏之氣焉耳其説見于素問脈腰精微論而其所以之故則秦越人八十一難之首章發明至矣是何也脈者血之流𣲖氣使然也肺居五藏之上氣所出入門戶也脈行始肺終肝而後復會于肺故其經穴名曰氣口而為脈之大會一身之害必于是占焉脈訣刋誤卷下
